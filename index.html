<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InboxOS — Unified Gmail Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ---------- design tokens — pastel light ---------- */
  :root {
    --bg-0: #fbf7f2;        /* warm cream base */
    --bg-1: #ffffff;        /* panels */
    --bg-2: #f5efe8;        /* soft peach-cream */
    --bg-3: #ece5dc;        /* dusty cream */
    --bg-4: #dfd5c8;        /* taupe cream */
    --line: #e8dfd3;        /* soft line */
    --line-bright: #d4c7b4; /* emphasis line */
    --ink-0: #3a3340;       /* soft plum ink */
    --ink-1: #5a5166;       /* secondary ink */
    --ink-2: #8a8196;       /* muted ink */
    --ink-3: #b0a7bc;       /* tertiary */
    --ink-4: #d8d0e0;       /* faintest */
    --accent: #b8d4a8;       /* sage green */
    --accent-dim: #94b088;
    --accent-soft: rgba(184, 212, 168, 0.22);
    --warn: #e8b88c;         /* peach — for backgrounds/fills */
    --warn-ink: #b07a4a;     /* deep caramel — for readable text */
    --danger: #e89ca0;       /* dusty rose — for backgrounds/fills */
    --danger-ink: #b05a60;   /* deep rose — for readable text */
    --info: #a8c4dc;         /* powder blue */
    --success: #b0d4c0;      /* mint */

    /* category tokens — pastel */
    --cat-eb1a: #e89ca0;     /* dusty rose */
    --cat-career: #a8c4dc;   /* powder blue */
    --cat-finance: #e8c48c;  /* buttercream */
    --cat-college: #a4d4c0;  /* seafoam */
    --cat-business: #e8b890; /* apricot */
    --cat-news: #c8a8d4;     /* lavender */
    --cat-admin: #c4b8c8;    /* mauve gray */
    --cat-household: #e8b4d0; /* rose petal */
    --cat-weather: #e89ca0;  /* dusty rose */
    --cat-delete: #b8b0bc;   /* soft slate */

    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
    --r-xl: 14px;

    --font-display: 'Instrument Serif', serif;
    --font-sans: 'Geist', -apple-system, system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-0);
    color: var(--ink-0);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(184, 212, 168, 0.15), transparent 50%),
      radial-gradient(800px 400px at 90% 110%, rgba(168, 196, 220, 0.12), transparent 50%),
      radial-gradient(600px 500px at 50% 50%, rgba(232, 180, 208, 0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

  /* ---------- typography ---------- */
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1);
    gap: 14px;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 14px;
    border-right: 1px solid var(--line);
    height: 100%;
  }
  .brand-logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: grid; place-items: center;
    color: #3a3340;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 12px;
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-style: italic;
    letter-spacing: -0.02em;
  }
  .brand-name em { font-style: normal; color: var(--accent); font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0; }

  .top-nav { display: flex; gap: 2px; align-items: center; height: 100%; }
  .top-nav-item {
    padding: 0 12px;
    height: 26px;
    display: flex;
    align-items: center;
    color: var(--ink-2);
    font-size: 12.5px;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: all 0.12s ease;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .top-nav-item:hover { color: var(--ink-0); background: var(--bg-3); }
  .top-nav-item.active { color: var(--ink-0); background: var(--bg-3); }

  .top-spacer { flex: 1; }

  /* mode toggle */
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 2px;
    height: 28px;
  }
  .mode-toggle button {
    border: none;
    background: transparent;
    color: var(--ink-2);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 0 10px;
    height: 100%;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.12s ease;
  }
  .mode-toggle button.active {
    background: var(--bg-1);
    color: var(--ink-0);
    box-shadow: 0 1px 0 rgba(90, 81, 102, 0.04);
  }
  .mode-toggle button.active.mode-b { color: #6a8858; }
  .mode-toggle button.active.mode-c { color: #5a8099; }
  .mode-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .icon-btn {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--r-md);
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .icon-btn:hover { background: var(--bg-3); color: var(--ink-0); border-color: var(--line); }

  /* ---------- main layout ---------- */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 240px 1fr 340px;
    min-height: 0;
    overflow: hidden;
  }
  .main.single { grid-template-columns: 1fr; }

  /* ---------- sidebar ---------- */
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll { overflow-y: auto; flex: 1; padding: 14px 0; }
  .side-section { padding: 0 14px; margin-bottom: 18px; }
  .side-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .side-label .count { color: var(--ink-2); }

  /* accounts list */
  .account-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 8px;
    border-radius: var(--r-md);
    cursor: pointer;
    color: var(--ink-1);
    font-size: 12.5px;
    margin: 0 -8px;
    transition: background 0.12s ease;
  }
  .account-item:hover { background: var(--bg-3); }
  .account-item.active { background: var(--bg-3); color: var(--ink-0); }
  .account-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.04);
  }
  .account-item.warning { color: var(--warn-ink); }
  .account-item .count-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-2);
    background: var(--bg-3);
    padding: 1px 6px;
    border-radius: 9px;
    min-width: 18px;
    text-align: center;
  }
  .account-item.active .count-badge { background: var(--bg-4); color: var(--ink-0); }

  .side-btn {
    width: 100%;
    padding: 7px 10px;
    background: transparent;
    border: 1px dashed var(--line-bright);
    border-radius: var(--r-md);
    color: var(--ink-2);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }
  .side-btn:hover { border-color: var(--accent-dim); color: #6a8858; background: var(--accent-soft); }

  /* categories */
  .cat-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 5px 8px;
    border-radius: var(--r-md);
    cursor: pointer;
    color: var(--ink-1);
    font-size: 12.5px;
    margin: 0 -8px;
    transition: background 0.12s ease;
  }
  .cat-item:hover { background: var(--bg-3); }
  .cat-item.active { background: var(--bg-3); color: var(--ink-0); }
  .cat-swatch { width: 3px; height: 14px; border-radius: 1px; flex-shrink: 0; }
  .cat-label { flex: 1; }
  .cat-count { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }

  /* eb1a radar */
  .radar-item {
    padding: 8px 10px;
    border-radius: var(--r-md);
    background: var(--bg-2);
    border: 1px solid var(--line);
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .radar-item:hover { border-color: var(--cat-eb1a); }
  .radar-criterion {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--cat-eb1a);
    margin-bottom: 3px;
  }
  .radar-subject {
    font-size: 11.5px;
    color: var(--ink-0);
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .radar-sender { font-size: 10.5px; color: var(--ink-2); margin-top: 3px; }

  /* ---------- email list ---------- */
  .list-panel {
    background: var(--bg-0);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .list-header {
    padding: 10px 18px 10px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .list-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .list-title-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-2);
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .list-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

  .filter-bar {
    padding: 8px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 6px;
    align-items: center;
    background: var(--bg-1);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .chip {
    height: 24px;
    padding: 0 10px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--ink-1);
    font-size: 11.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--line-bright); }
  .chip.active { background: var(--ink-0); color: var(--bg-0); border-color: var(--ink-0); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; }

  .email-list { flex: 1; overflow-y: auto; }
  .email-row {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    display: grid;
    grid-template-columns: 4px 20px 1fr auto;
    gap: 10px;
    align-items: start;
    transition: background 0.1s ease;
    position: relative;
  }
  .email-row:hover { background: var(--bg-1); }
  .email-row.selected { background: var(--bg-2); }
  .email-row.unread .email-subject { font-weight: 600; color: var(--ink-0); }
  .email-row.unread::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 60%;
    background: var(--accent-dim);
    border-radius: 2px;
  }

  .email-account-bar { width: 2px; border-radius: 2px; align-self: stretch; }
  .email-priority { width: 4px; height: 4px; border-radius: 50%; margin-top: 8px; background: var(--ink-3); }
  .email-priority.high { background: var(--danger); }
  .email-priority.medium { background: var(--warn); }

  .email-content { min-width: 0; }
  .email-meta-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }
  .email-sender {
    font-size: 12.5px;
    color: var(--ink-1);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }
  .email-account-pill {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--bg-3);
    color: var(--ink-2);
    flex-shrink: 0;
  }
  .email-subject {
    font-size: 13px;
    color: var(--ink-1);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .email-snippet {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.4;
    margin-top: 2px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .email-ai-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--ink-2);
    margin-top: 6px;
    padding: 2px 6px;
    background: var(--bg-2);
    border-radius: 3px;
    border: 1px solid var(--line);
  }
  .email-ai-tag.eb1a { color: var(--cat-eb1a); border-color: rgba(232, 156, 160, 0.45); background: rgba(232, 156, 160, 0.12); }
  .email-cat-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }

  .email-time {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    white-space: nowrap;
    padding-top: 2px;
  }

  /* empty states */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    color: var(--ink-3);
  }
  .empty-icon {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 52px;
    color: var(--ink-4);
    margin-bottom: 8px;
    line-height: 1;
  }
  .empty-title {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
    color: var(--ink-1);
    margin-bottom: 6px;
  }
  .empty-text { font-size: 12.5px; color: var(--ink-2); max-width: 360px; line-height: 1.55; }

  /* ---------- detail panel ---------- */
  .detail-panel {
    border-left: 1px solid var(--line);
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-scroll { flex: 1; overflow-y: auto; }
  .detail-header {
    padding: 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .detail-subject {
    font-family: var(--font-display);
    font-size: 19px;
    line-height: 1.25;
    color: var(--ink-0);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .detail-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: var(--ink-2);
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .detail-from { color: var(--ink-1); font-weight: 500; }
  .detail-routing {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    font-size: 11.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .routing-label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }

  /* ai panel */
  .ai-panel {
    margin: 14px;
    padding: 12px;
    background: linear-gradient(180deg, rgba(184, 212, 168, 0.18), rgba(184, 212, 168, 0.04));
    border: 1px solid rgba(184, 212, 168, 0.4);
    border-radius: var(--r-lg);
    box-shadow: 0 1px 0 rgba(148, 176, 136, 0.1);
  }
  .ai-panel.placeholder {
    background: var(--bg-2);
    border: 1px dashed var(--line-bright);
    box-shadow: none;
  }
  .ai-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6a8858;
    margin-bottom: 10px;
  }
  .ai-placeholder .ai-header { color: var(--ink-3); }
  .ai-summary { font-size: 12.5px; color: var(--ink-0); line-height: 1.5; margin-bottom: 10px; }
  .ai-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .ai-stat {
    padding: 8px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
  }
  .ai-stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    margin-bottom: 3px;
  }
  .ai-stat-value { font-size: 12px; color: var(--ink-0); font-weight: 500; }
  .eb1a-callout {
    margin-top: 10px;
    padding: 10px;
    background: rgba(232, 156, 160, 0.14);
    border: 1px solid rgba(232, 156, 160, 0.35);
    border-radius: var(--r-md);
  }
  .eb1a-title {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cat-eb1a);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .eb1a-explanation { font-size: 12px; color: var(--ink-1); line-height: 1.5; margin-bottom: 8px; }

  /* detail body */
  .detail-body {
    padding: 14px;
    font-size: 13px;
    color: var(--ink-1);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* detail actions */
  .detail-actions {
    padding: 10px 14px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    background: var(--bg-1);
    flex-shrink: 0;
  }

  /* ---------- buttons ---------- */
  .btn {
    height: 30px;
    padding: 0 12px;
    border-radius: var(--r-md);
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-0);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.14s ease;
    white-space: nowrap;
    box-shadow: 0 1px 0 rgba(90, 81, 102, 0.03);
  }
  .btn:hover { background: var(--bg-2); border-color: var(--line-bright); color: var(--ink-0); box-shadow: 0 2px 6px rgba(90, 81, 102, 0.08); }
  .btn.primary { background: var(--accent); color: #3a3340; border-color: var(--accent-dim); font-weight: 500; box-shadow: 0 1px 0 rgba(148, 176, 136, 0.25); }
  .btn.primary:hover { background: #a4c898; border-color: #8aa880; color: #3a3340; box-shadow: 0 3px 10px rgba(148, 176, 136, 0.3); }
  .btn.danger { color: #b05a60; }
  .btn.danger:hover { background: rgba(232, 156, 160, 0.15); border-color: var(--danger); }
  .btn.sm { height: 26px; padding: 0 9px; font-size: 11.5px; }
  .btn.lg { height: 38px; padding: 0 18px; font-size: 13px; }

const storage = {
  get(key, fallback = null) {
    try {
      const raw = localStorage.getItem(key);
      if (!raw) return fallback;
      return JSON.parse(raw);
    } catch { return fallback; }
  },
  set(key, value) {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch (e) { console.error('Storage write failed:', e); }
  },
  remove(key) { try { localStorage.removeItem(key); } catch {} },
  keys() { return Object.keys(localStorage); },
};

function loadConfig() {
  return storage.get('inboxos_config', {
    googleClientId: '',
    anthropicApiKey: '',
    budgetCapMonthly: 10.0,
    defaultMode: 'c',
    currentMode: 'c',
    categories: DEFAULT_CATEGORIES,
    onboardingComplete: false,
  });
}

function saveConfig(config) { storage.set('inboxos_config', config); }

function loadAccounts() {
  const accounts = [];
  for (const key of storage.keys()) {
    if (key.startsWith('inboxos_account_')) {
      const account = storage.get(key);
      if (account) accounts.push(account);
    }
  }
  return accounts.sort((a, b) => (a.order || 0) - (b.order || 0));
}

function saveAccount(account) { storage.set(`inboxos_account_${account.id}`, account); }
function removeAccount(id) { storage.remove(`inboxos_account_${id}`); }

function loadUsageLog() { return storage.get('inboxos_usage_log', []); }

  const log = loadUsageLog();
  log.push(record);
  if (log.length > 5000) log.splice(0, log.length - 5000);
  storage.set('inboxos_usage_log', log);
}

/* ============================================================
   PKCE HELPERS
   ============================================================ */

function base64UrlEncode(bytes) {
  const str = btoa(String.fromCharCode(...new Uint8Array(bytes)));
  return str.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generatePKCE() {
  const bytes = new Uint8Array(64);
  crypto.getRandomValues(bytes);
  const verifier = base64UrlEncode(bytes).slice(0, 86);
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = base64UrlEncode(hash);
  return { verifier, challenge };
}

function randomId() {
  const bytes = new Uint8Array(8);
  crypto.getRandomValues(bytes);
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

async function startOAuthFlow(clientId) {
  if (!clientId) throw new Error('Google OAuth Client ID not set. Configure it in Settings.');
  const { verifier, challenge } = await generatePKCE();
  const state = randomId();
  const redirectUri = window.location.origin + window.location.pathname;

  sessionStorage.setItem(`oauth_verifier_${state}`, verifier);
  sessionStorage.setItem(`oauth_redirect_${state}`, redirectUri);

  const params = new URLSearchParams({
    client_id: clientId,
    redirect_uri: redirectUri,
    response_type: 'code',
    scope: OAUTH_SCOPES,
    code_challenge: challenge,
    code_challenge_method: 'S256',
    access_type: 'offline',
    prompt: 'consent',
    state,
  });

  const url = `${GOOGLE_AUTH_ENDPOINT}?${params.toString()}`;
  const popup = window.open(url, 'inboxos_oauth', 'width=520,height=640,left=' + ((screen.width-520)/2) + ',top=' + ((screen.height-640)/2));
  if (!popup) throw new Error('Popup blocked. Please allow popups for this site.');

  return new Promise((resolve, reject) => {
    const handleMessage = async (event) => {
      if (event.origin !== window.location.origin) return;
      if (!event.data || event.data.type !== 'oauth_callback') return;
      window.removeEventListener('message', handleMessage);
      try {
        const code = event.data.code;
        const returnedState = event.data.state;
        if (returnedState !== state) throw new Error('State mismatch — OAuth flow was tampered with.');
        const savedVerifier = sessionStorage.getItem(`oauth_verifier_${state}`);
        const savedRedirect = sessionStorage.getItem(`oauth_redirect_${state}`);
        sessionStorage.removeItem(`oauth_verifier_${state}`);
        sessionStorage.removeItem(`oauth_redirect_${state}`);

        const tokenRes = await fetch(GOOGLE_TOKEN_ENDPOINT, {
          method: 'POST',
          headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
          body: new URLSearchParams({
            grant_type: 'authorization_code',
            client_id: clientId,
            code,
            redirect_uri: savedRedirect,
            code_verifier: savedVerifier,
          }),
        });
        if (!tokenRes.ok) {
          const err = await tokenRes.text();
          throw new Error('Token exchange failed: ' + err);
        }
        const tokens = await tokenRes.json();

        // fetch profile to get email
        const profileRes = await fetch(`${GMAIL_API_BASE}/profile`, {
          headers: { Authorization: 'Bearer ' + tokens.access_token },
        });
        if (!profileRes.ok) throw new Error('Failed to fetch Gmail profile');
        const profile = await profileRes.json();

        resolve({
          email: profile.emailAddress,
          accessToken: tokens.access_token,
          refreshToken: tokens.refresh_token || '',
          tokenExpiry: Date.now() + (tokens.expires_in * 1000),
        });
      } catch (e) { reject(e); }
    };
    window.addEventListener('message', handleMessage);

    const checkClosed = setInterval(() => {
      if (popup.closed) {
        clearInterval(checkClosed);
        window.removeEventListener('message', handleMessage);
        reject(new Error('OAuth popup closed before completion.'));
      }
    }, 500);
  });
}

// check for OAuth callback on page load
function handleOAuthRedirect() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const state = params.get('state');
  if (code && state && window.opener) {
    window.opener.postMessage({ type: 'oauth_callback', code, state }, window.location.origin);
    window.close();
    return true;
  }
  return false;
}

async function refreshAccessToken(account, clientId) {
  if (!account.refreshToken) throw new Error('No refresh token — reconnect required');
  const res = await fetch(GOOGLE_TOKEN_ENDPOINT, {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body: new URLSearchParams({
      grant_type: 'refresh_token',
      client_id: clientId,
      refresh_token: account.refreshToken,
    }),
  });
  if (!res.ok) throw new Error('Refresh failed');
  const t = await res.json();
  return {
    ...account,
    accessToken: t.access_token,
    tokenExpiry: Date.now() + (t.expires_in * 1000),
    status: 'active',
  };
}

async function withToken(account, clientId, setAccount) {
  if (!account || account.status === 'needs_reconnect') throw new Error('Account needs reconnect');
  if (Date.now() > account.tokenExpiry - 5 * 60 * 1000) {
    try {
      const refreshed = await refreshAccessToken(account, clientId);
      saveAccount(refreshed);
      setAccount && setAccount(refreshed);
      return refreshed.accessToken;
    } catch (e) {
      const bad = { ...account, status: 'needs_reconnect' };
      saveAccount(bad);
      setAccount && setAccount(bad);
      throw e;
    }
  }
  return account.accessToken;
}

async function gmailFetch(path, options, token) {
  const res = await fetch(`${GMAIL_API_BASE}${path}`, {
    ...options,
    headers: { ...(options?.headers || {}), Authorization: 'Bearer ' + token },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Gmail API ${res.status}: ${txt}`);
  }
  return res.json();
}

async function sendReply(account, clientId, setAccount, { to, subject, body, threadId, inReplyTo, references }) {
  const token = await withToken(account, clientId, setAccount);
  const headers = [
    `From: ${account.email}`,
    `To: ${to}`,
    `Subject: ${subject}`,
    `In-Reply-To: ${inReplyTo}`,
    `References: ${references || inReplyTo}`,
    'Content-Type: text/plain; charset=UTF-8',
    'MIME-Version: 1.0',
  ].join('\r\n');
  const raw = headers + '\r\n\r\n' + body;
  const encoded = base64UrlEncode(new TextEncoder().encode(raw));
  return gmailFetch('/messages/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ raw: encoded, threadId }),
  }, token);
}

/* ============================================================
   EMAIL PARSING
   ============================================================ */

function decodeBase64Url(str) {
  try {
    const padded = str.replace(/-/g, '+').replace(/_/g, '/') + '=='.slice(0, (4 - str.length % 4) % 4);
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  } catch { return ''; }
}

function extractBody(payload) {
  if (!payload) return '';
  if (payload.body && payload.body.data && (payload.mimeType === 'text/plain' || payload.mimeType === 'text/html')) {
    const raw = decodeBase64Url(payload.body.data);
    if (payload.mimeType === 'text/html') {
      const tmp = document.createElement('div');
      tmp.innerHTML = raw;
      return (tmp.textContent || tmp.innerText || '').trim();
    }
    return raw;
  }
  if (payload.parts) {
    // prefer text/plain
    const plain = payload.parts.find(p => p.mimeType === 'text/plain');
    if (plain) return extractBody(plain);
    for (const p of payload.parts) {
      const b = extractBody(p);
      if (b) return b;
    }
  }
  return '';
}

function parseHeaderValue(headers, name) {
  const h = headers?.find(x => x.name.toLowerCase() === name.toLowerCase());
  return h?.value || '';
}

function parseFromHeader(from) {
  const m = from.match(/^\s*"?([^"<]*?)"?\s*<([^>]+)>\s*$/);
  if (m) return { name: m[1].trim() || m[2], email: m[2].trim() };
  return { name: from.trim(), email: from.trim() };
}

function normalizeThread(thread, account) {
  const messages = thread.messages || [];
  const last = messages[messages.length - 1];
  if (!last) return null;
  const headers = last.payload?.headers || [];
  const from = parseFromHeader(parseHeaderValue(headers, 'From'));
  const subject = parseHeaderValue(headers, 'Subject') || '(no subject)';
  const date = parseHeaderValue(headers, 'Date');
  const messageIdHeader = parseHeaderValue(headers, 'Message-ID') || parseHeaderValue(headers, 'Message-Id');
  const references = parseHeaderValue(headers, 'References');
  const body = extractBody(last.payload);
  const snippet = thread.snippet || last.snippet || '';
  const labels = last.labelIds || [];
  const isUnread = labels.includes('UNREAD');
  return {
    threadId: thread.id,
    messageId: last.id,
    messageIdHeader,
    references,
    subject,
    from,
    date: date ? new Date(date).getTime() : Date.now(),
    body: body.slice(0, 8000),
    snippet,
    labels,
    isUnread,
    receivingAccountId: account.id,
    receivingAccountEmail: account.email,
  };
}

function formatTime(timestamp) {
  const d = new Date(timestamp);
  const now = new Date();
  const diffMs = now - d;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

/* ============================================================
   CLAUDE API
   ============================================================ */

async function callClaude({ apiKey, systemPrompt, userPrompt }) {
  if (!apiKey) throw new Error('Anthropic API key not set');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: ANTHROPIC_MODEL,
      max_tokens: 1000,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }],
    }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Anthropic API ${res.status}: ${txt}`);
  }
  const data = await res.json();
  const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
  return {
    text,
    inputTokens: data.usage?.input_tokens || 0,
    outputTokens: data.usage?.output_tokens || 0,
  };
}

function buildTriageSystemPrompt(categories) {
  const catList = categories.map(c => c.id).join(', ');
  return `You are an AI email assistant for Avitesh Kesharwani. He is a researcher and software engineer living in Concord, North Carolina. He is actively pursuing an EB-1A extraordinary ability visa petition. He is also a part-time student and owns a laundry business. He has up to 10 Gmail accounts (personal, family, college, business).

Your job is to triage an incoming email and return a structured JSON response only. No preamble, no markdown, no code fences — just raw JSON.

EB-1A criteria to watch for:
- judging: Invitations to review papers, judge competitions, review grants
- publications: Citation alerts, co-author requests, publication acceptances
- critical_role: Job offers or recognition noting his leadership/critical role
- media: Press coverage, interview requests, podcast invitations
- high_salary: Job offers with exceptional compensation
- awards: Award nominations or recognitions
- memberships: Invitations to distinguished professional organizations
- contributions: Evidence of original contributions cited or built upon by others

Categories available: ${catList}

Response format (JSON only):
{
  "category": "<category_id>",
  "summary": "<one sentence describing what this email is and what it wants>",
  "suggestedAction": "<one concrete action: reply, archive, save, unsubscribe, review>",
  "priority": "<high|medium|low>",
  "eb1aSignal": {
    "detected": <true|false>,
    "criterion": "<criterion_id or null>",
    "explanation": "<one sentence, or null>"
  }
}`;
}

async function analyzeEmail(email, config) {
  const systemPrompt = buildTriageSystemPrompt(config.categories);
  const userPrompt = `Triage this email:
From: ${email.from.name} <${email.from.email}>
Subject: ${email.subject}
Snippet: ${email.snippet}
Body: ${email.body.slice(0, 500)}`;

  const { text, inputTokens, outputTokens } = await callClaude({
    apiKey: config.anthropicApiKey,
    systemPrompt,
    userPrompt,
  });

  let parsed;
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    parsed = JSON.parse(clean);
  } catch {
    parsed = {
      category: 'admin',
      summary: 'Could not parse AI response',
      suggestedAction: 'review',
      priority: 'low',
      eb1aSignal: { detected: false, criterion: null, explanation: null },
    };
  }

  const cost = inputTokens * COST_INPUT_PER_TOKEN + outputTokens * COST_OUTPUT_PER_TOKEN;
  return { ...parsed, inputTokens, outputTokens, cost };
}

async function draftReply(email, instruction, config) {
  const systemPrompt = `You are drafting a professional email reply for Avitesh Kesharwani. Write only the reply body — no subject line, no "Here is a draft" preamble. Keep it concise and natural. Match the tone of the original email (formal if formal, casual if casual). Sign off as "Avitesh".`;
  const userPrompt = `Draft a reply to this email.
Original sender: ${email.from.name} <${email.from.email}>
Original subject: ${email.subject}
Original body: ${email.body}
${instruction ? `\nUser instruction: ${instruction}` : ''}`;

  const { text, inputTokens, outputTokens } = await callClaude({
    apiKey: config.anthropicApiKey,
    systemPrompt,
    userPrompt,
  });
  const cost = inputTokens * COST_INPUT_PER_TOKEN + outputTokens * COST_OUTPUT_PER_TOKEN;
  return { text: text.trim(), inputTokens, outputTokens, cost };
}

const ToastContext = React.createContext(null);
function useToast() { return React.useContext(ToastContext); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = 'info', ms = 3500) => {
    const id = randomId();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), ms);
  }, []);
  return (
    <ToastContext.Provider value={push}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </ToastContext.Provider>
  );
}

function EB1ARadar({ emails, analyses, onOpenEvidence, onSelectEmail }) {
  const signals = useMemo(() => {
    const out = [];
    for (const email of emails) {
      const a = analyses[email.threadId];
      if (a?.eb1aSignal?.detected) {
        out.push({ email, analysis: a });
      }
    }
    out.sort((a, b) => (CRITERION_RANK[a.analysis.eb1aSignal.criterion] || 99) - (CRITERION_RANK[b.analysis.eb1aSignal.criterion] || 99));
    return out;
  }, [emails, analyses]);

  return (
    <div className="side-section">
      <div className="side-label">
        <span style={{ color: 'var(--cat-eb1a)' }}>EB-1A Radar</span>
        <span className="count">{signals.length}</span>
      </div>
      {signals.slice(0, 5).map(s => (
        <div key={s.email.threadId} className="radar-item" onClick={() => onSelectEmail(s.email)}>
          <div className="radar-criterion">{CRITERION_LABELS[s.analysis.eb1aSignal.criterion] || s.analysis.eb1aSignal.criterion}</div>
          <div className="radar-subject">{s.email.subject}</div>

function ReplyComposer({ email, accounts, config, onClose, onSent, onError }) {
  const account = accounts.find(a => a.id === email.receivingAccountId);
  const [to, setTo] = useState(email.from.email);
  const [subject, setSubject] = useState(email.subject.startsWith('Re:') ? email.subject : 'Re: ' + email.subject);
  const [body, setBody] = useState('');
  const [drafting, setDrafting] = useState(false);
  const [sending, setSending] = useState(false);
  const [aiInstruction, setAiInstruction] = useState('');
  const toast = useToast();

  async function handleDraft() {
    if (!config.anthropicApiKey) { toast('Set your Anthropic API key first', 'error'); return; }
    setDrafting(true);
    try {
      const res = await draftReply(email, aiInstruction, config);
      setBody(res.text);
      appendUsage({
        timestamp: Date.now(),
        accountId: email.receivingAccountId,
        threadId: email.threadId,
        callType: 'reply_draft',
        inputTokens: res.inputTokens,
        outputTokens: res.outputTokens,
        cost: res.cost,
        mode: config.currentMode,
      });
      toast('Draft generated', 'info');
    } catch (e) { toast('Draft failed: ' + e.message, 'error'); }
    finally { setDrafting(false); }
  }

  async function handleSend() {
    if (!body.trim()) { toast('Empty message', 'warn'); return; }
    setSending(true);
    try {
      const quoted = `\n\nOn ${new Date(email.date).toLocaleString()}, ${email.from.name} <${email.from.email}> wrote:\n${email.body.split('\n').map(l => '> ' + l).join('\n')}`;
      await sendReply(account, config.googleClientId, (acc) => saveAccount(acc), {
        to, subject,
        body: body + quoted,
        threadId: email.threadId,
        inReplyTo: email.messageIdHeader,
        references: email.references ? email.references + ' ' + email.messageIdHeader : email.messageIdHeader,
      });
      toast('Reply sent from ' + account.label, 'info');
      onSent();
    } catch (e) {
      toast('Send failed: ' + e.message, 'error');
      onError && onError(e);
    } finally { setSending(false); }
  }

  return (
    <div className="composer-overlay" onClick={(e) => { if (e.target.classList.contains('composer-overlay')) onClose(); }}>
      <div className="composer">
        <div className="composer-head">
          <h3>Reply</h3>
          <span className="lock-pill"><Icon name="lock" size={9} /> Routed</span>
          <button className="icon-btn" onClick={onClose} style={{ marginLeft: 'auto' }}><Icon name="x" size={14} /></button>
        </div>
        <div className="composer-fields">
          <div className="composer-field">
            <label>From</label>
            <div className="field-locked">
              <div className="account-dot" style={{ background: account?.color }}></div>
              <span className="field-static">{account?.email}</span>
              <span className="lock-pill" style={{ marginLeft: 8 }}><Icon name="lock" size={9} /> Locked to receiving account</span>
            </div>
          </div>
          <div className="composer-field">
            <label>To</label>
            <input value={to} onChange={e => setTo(e.target.value)} />
          </div>
          <div className="composer-field">
            <label>Subject</label>
            <input value={subject} onChange={e => setSubject(e.target.value)} />
          </div>
        </div>
        <div className="composer-body">
          <textarea
            className="composer-textarea"
            placeholder="Write your reply..."
            value={body}
            onChange={e => setBody(e.target.value)}
          />
          <div className="composer-quote">
            On {new Date(email.date).toLocaleString()}, {email.from.name} wrote:{'\n'}
            {(email.body || email.snippet).split('\n').slice(0, 6).map((l, i) => <div key={i}>&gt; {l}</div>)}
          </div>
        </div>
        <div className="composer-foot">
          <input
            className="input"
            style={{ maxWidth: 280, height: 32 }}
            placeholder="AI draft instruction (optional)"
            value={aiInstruction}
            onChange={e => setAiInstruction(e.target.value)}
          />
          <button className="btn" disabled={drafting || !config.anthropicApiKey} onClick={handleDraft}>
            {drafting ? <><span className="spinner"></span> Drafting...</> : <><Icon name="sparkles" size={12} /> AI draft</>}
          </button>
          <button className="btn primary" style={{ marginLeft: 'auto' }} disabled={sending} onClick={handleSend}>
            {sending ? <><span className="spinner"></span> Sending...</> : <><Icon name="send" size={12} /> Send</>}
          </button>
        </div>
      </div>
    </div>
  );
}

/* ============================================================
   USAGE DASHBOARD
   ============================================================ */

function usageFilter(records, period) {
  const now = new Date();
  let start;
  if (period === 'day') {
    start = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
  } else if (period === 'week') {
    const day = now.getDay();
    const monday = new Date(now.getFullYear(), now.getMonth(), now.getDate() - (day === 0 ? 6 : day - 1));
    start = monday.getTime();
  } else {
    start = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
  }
  return records.filter(r => r.timestamp >= start);
}

function summarizeUsage(records) {
  const cost = records.reduce((s, r) => s + r.cost, 0);
  const tokens = records.reduce((s, r) => s + r.inputTokens + r.outputTokens, 0);
  const analyzed = new Set(records.filter(r => r.callType === 'auto_scan' || r.callType === 'on_demand_analysis').map(r => r.threadId)).size;
  const replies = records.filter(r => r.callType === 'reply_draft').length;
  const calls = records.length;
  return {
    cost, tokens, analyzed, replies, calls,
    avgCostPerEmail: analyzed ? cost / analyzed : 0,
  };
}

function UsageDashboard({ config, setConfig, accounts }) {
  const [usageLog, setUsageLog] = useState(loadUsageLog());
  const [period, setPeriod] = useState('day');
  const chartRef = useRef(null);
  const accountChartRef = useRef(null);
  const chartInstance = useRef(null);
  const accountChartInstance = useRef(null);
  const toast = useToast();

  const records = usageFilter(usageLog, period);
  const summary = summarizeUsage(records);
  const budgetPct = config.budgetCapMonthly > 0 ? summarizeUsage(usageFilter(usageLog, 'month')).cost / config.budgetCapMonthly : 0;

  useEffect(() => {
    if (!chartRef.current) return;

    const now = new Date();
    let labels = [], data = [];

    if (period === 'day') {
      labels = Array.from({ length: 24 }, (_, i) => `${i}:00`);
      data = Array(24).fill(0);
      for (const r of records) {
        const h = new Date(r.timestamp).getHours();
        data[h] += r.cost;
      }
    } else if (period === 'week') {
      const dayNames = ['Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat', 'Sun'];
      labels = dayNames;
      data = Array(7).fill(0);
      for (const r of records) {
        const d = new Date(r.timestamp).getDay();
        const idx = d === 0 ? 6 : d - 1;
        data[idx] += r.cost;
      }
    } else {
      const daysInMonth = new Date(now.getFullYear(), now.getMonth() + 1, 0).getDate();
      labels = Array.from({ length: daysInMonth }, (_, i) => String(i + 1));
      data = Array(daysInMonth).fill(0);
      for (const r of records) {
        const d = new Date(r.timestamp).getDate();
        data[d - 1] += r.cost;
      }
    }

    if (chartInstance.current) chartInstance.current.destroy();
    chartInstance.current = new Chart(chartRef.current, {
      type: 'bar',
      data: {
        labels,
        datasets: [{
          data,
          backgroundColor: 'rgba(184, 212, 168, 0.55)',
          borderColor: '#94b088',
          borderWidth: 1,
          borderRadius: 3,
        }],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false }, tooltip: { callbacks: { label: (ctx) => '$' + ctx.parsed.y.toFixed(4) } } },
        scales: {
          x: { ticks: { color: '#8a8196', font: { size: 10, family: 'IBM Plex Mono' } }, grid: { display: false } },
          y: { ticks: { color: '#8a8196', font: { size: 10, family: 'IBM Plex Mono' }, callback: v => '$' + v.toFixed(3) }, grid: { color: '#e8dfd3' } },
        },
      },
    });

    return () => { if (chartInstance.current) chartInstance.current.destroy(); };
  }, [period, usageLog]);

  useEffect(() => {
    if (!accountChartRef.current) return;
    const monthly = usageFilter(usageLog, 'month');
    const byAccount = {};
    for (const r of monthly) {
      byAccount[r.accountId] = (byAccount[r.accountId] || 0) + r.cost;
    }
    const labels = accounts.map(a => a.label);
    const data = accounts.map(a => byAccount[a.id] || 0);
    const colors = accounts.map(a => a.color);

    if (accountChartInstance.current) accountChartInstance.current.destroy();
    if (data.every(v => v === 0)) return;

    accountChartInstance.current = new Chart(accountChartRef.current, {
      type: 'doughnut',
      data: { labels, datasets: [{ data, backgroundColor: colors, borderColor: '#ffffff', borderWidth: 3 }] },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'right', labels: { color: '#5a5166', font: { size: 11, family: 'Geist' }, boxWidth: 10 } },
          tooltip: { callbacks: { label: (ctx) => `${ctx.label}: $${ctx.parsed.toFixed(4)}` } },
        },
        cutout: '65%',
      },
    });

    return () => { if (accountChartInstance.current) accountChartInstance.current.destroy(); };
  }, [usageLog, accounts]);

  const budgetClass = budgetPct >= 1 ? 'danger' : budgetPct >= 0.8 ? 'warn' : '';

  function exportCSV() {
    const rows = [['timestamp', 'accountId', 'threadId', 'callType', 'inputTokens', 'outputTokens', 'cost', 'mode']];
    for (const r of usageLog) {
      rows.push([new Date(r.timestamp).toISOString(), r.accountId, r.threadId, r.callType, r.inputTokens, r.outputTokens, r.cost.toFixed(6), r.mode]);
    }
    const csv = rows.map(r => r.join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'inboxos-usage.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function resetPeriod() {
    if (!confirm('Reset all usage logs? This cannot be undone.')) return;
    storage.set('inboxos_usage_log', []);
    setUsageLog([]);
    toast('Usage logs cleared', 'info');
  }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">Usage & cost</div>
          <div className="page-subtitle" style={{ marginTop: 8 }}>
            Every AI call logged. Three windows, one budget. Track which accounts generate spend and pause before you overshoot.
          </div>
        </div>
      </div>

      <div className="tab-row">
        {['day', 'week', 'month'].map(p => (
          <button key={p} className={`tab ${period === p ? 'active' : ''}`} onClick={() => setPeriod(p)}>
            {p === 'day' ? 'Today' : p === 'week' ? 'This week' : 'This month'}
          </button>
        ))}
      </div>

      <div className="stat-grid">
        <div className="stat-card">
          <div className="stat-label">Total cost</div>
          <div className="stat-value positive">${summary.cost.toFixed(4)}</div>
          <div className="stat-sub">USD</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Tokens</div>
          <div className="stat-value">{summary.tokens.toLocaleString()}</div>
          <div className="stat-sub">input + output</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Emails analyzed</div>
          <div className="stat-value">{summary.analyzed}</div>
          <div className="stat-sub">unique threads</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Replies drafted</div>
          <div className="stat-value">{summary.replies}</div>
          <div className="stat-sub">AI generations</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Calls made</div>
          <div className="stat-value">{summary.calls}</div>
          <div className="stat-sub">total API calls</div>
        </div>
        <div className="stat-card">
          <div className="stat-label">Avg cost / email</div>
          <div className="stat-value">${summary.avgCostPerEmail.toFixed(4)}</div>
          <div className="stat-sub">per triage</div>
        </div>
      </div>

      <div className="chart-card">
        <h3>{period === 'day' ? 'Hourly spend today' : period === 'week' ? 'Daily spend this week' : 'Daily spend this month'}</h3>
        <div className="chart-container"><canvas ref={chartRef}></canvas></div>
      </div>

      <div className="budget-row">
        <div className="budget-card">
          <h3 style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 20, marginBottom: 4, fontWeight: 400 }}>Monthly budget</h3>
          <div className="stat-sub" style={{ marginTop: 0, marginBottom: 8 }}>Mode B pauses at 100%. Mode C confirms before charging past the cap.</div>
          <div className="budget-amounts">
            <span>${summarizeUsage(usageFilter(usageLog, 'month')).cost.toFixed(4)} used</span>
            <span>${config.budgetCapMonthly.toFixed(2)} cap</span>
          </div>
          <div className="budget-bar">
            <div className={`budget-fill ${budgetClass}`} style={{ width: Math.min(100, budgetPct * 100) + '%' }}></div>
          </div>
          <div className="hstack" style={{ marginTop: 12 }}>
            <input
              className="input mono" type="number" step="0.5" min="0" style={{ maxWidth: 120 }}
              value={config.budgetCapMonthly}
              onChange={e => { const c = { ...config, budgetCapMonthly: parseFloat(e.target.value) || 0 }; setConfig(c); saveConfig(c); }}
            />
            <button className="btn sm" onClick={exportCSV}><Icon name="download" size={11} /> Export log</button>
            <button className="btn sm danger" onClick={resetPeriod}>Reset logs</button>
          </div>
          {budgetPct >= 0.8 && budgetPct < 1 && (
            <div style={{ marginTop: 10, color: 'var(--warn-ink)', fontSize: 11.5 }}>⚠ Approaching cap — {Math.round(budgetPct * 100)}% used</div>
          )}
          {budgetPct >= 1 && (
            <div style={{ marginTop: 10, color: 'var(--danger-ink)', fontSize: 11.5 }}>⚠ Cap reached. Mode B paused. Mode C will confirm each call.</div>
          )}
        </div>

        <div className="budget-card">
          <h3 style={{ fontFamily: 'var(--font-display)', fontStyle: 'italic', fontSize: 20, marginBottom: 4, fontWeight: 400 }}>By account (this month)</h3>
          <div className="stat-sub" style={{ marginTop: 0, marginBottom: 14 }}>Where spend is going across your connected accounts.</div>
          <div className="chart-container" style={{ height: 180 }}><canvas ref={accountChartRef}></canvas></div>
        </div>
      </div>
    </div>
  );
}

function SettingsPage({ config, setConfig, accounts, setAccounts, onAddAccount, toast }) {
  const [localConfig, setLocalConfig] = useState(config);
  const [savedFlash, setSavedFlash] = useState(false);
  const savedTimer = useRef(null);

  function flashSaved() {
    setSavedFlash(true);
    if (savedTimer.current) clearTimeout(savedTimer.current);
    savedTimer.current = setTimeout(() => setSavedFlash(false), 1400);
  }

  function persist(patch) {
    const next = { ...localConfig, ...patch };
    setLocalConfig(next);
    setConfig(next);
    saveConfig(next);
    flashSaved();
  }

  function handleRename(account, label) {
    const next = { ...account, label };
    saveAccount(next);
    setAccounts(a => a.map(x => x.id === account.id ? next : x));
    flashSaved();
  }

  function handleRemove(account) {
    if (!confirm(`Remove ${account.email}? You'll need to reconnect to access it again.`)) return;
    removeAccount(account.id);
    setAccounts(a => a.filter(x => x.id !== account.id));
    toast('Account removed', 'info');
  }

  function exportEvidence() {
    const evidence = loadEvidence();
    const rows = [['savedAt', 'accountId', 'subject', 'sender', 'criterion', 'explanation', 'threadId']];
    for (const e of evidence) {
      rows.push([new Date(e.savedAt).toISOString(), e.accountId, e.subject, e.sender, e.criterion, e.explanation, e.threadId]);
    }
    const csv = rows.map(r => r.map(v => `"${String(v).replace(/"/g, '""')}"`).join(',')).join('\n');
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url; a.download = 'eb1a-evidence.csv'; a.click();
    URL.revokeObjectURL(url);
  }

  function resetAll() {
    if (!confirm('This will erase ALL data: accounts, tokens, analyses, usage logs, evidence, and settings. Continue?')) return;
    if (!confirm('Are you sure? This cannot be undone.')) return;
    for (const k of storage.keys()) {
      if (k.startsWith('inboxos_')) storage.remove(k);
    }
    location.reload();
  }

  return (
    <div className="page">
      <div className="page-header">
        <div>
          <div className="page-title">Settings</div>
          <div className="page-subtitle" style={{ marginTop: 8 }}>
            Credentials, accounts, categories, and exports. Changes save instantly — there's no Save button because every edit is persisted the moment you make it.
          </div>
        </div>
        <div style={{ marginLeft: 'auto', display: 'flex', alignItems: 'center', gap: 10 }}>
          <div className={`saved-indicator ${savedFlash ? 'flash' : ''}`}>
            <span className="saved-dot"></span>
            <span>{savedFlash ? 'Saved' : 'All changes saved'}</span>
          </div>
        </div>
      </div>

      <div className="settings-section">
        <h2>Credentials</h2>
        <div className="settings-body">
          <div className="form-row">
            <label className="form-label">Google OAuth Client ID</label>
            <input className="input mono"
              value={localConfig.googleClientId}
              onChange={e => persist({ googleClientId: e.target.value })}
              placeholder="xxxxx.apps.googleusercontent.com" />
          </div>
          <div className="form-row">
            <label className="form-label">Anthropic API key</label>
            <input className="input mono" type="password"
              value={localConfig.anthropicApiKey}
              onChange={e => persist({ anthropicApiKey: e.target.value })}
              placeholder="sk-ant-..." />
          </div>
        </div>
      </div>

      <div className="settings-section">
        <h2>Accounts</h2>
        <div className="settings-body">
          {accounts.length === 0 && <div style={{ color: 'var(--ink-2)', fontSize: 12.5, marginBottom: 12 }}>No accounts yet.</div>}
          {accounts.map(a => (
            <div key={a.id} style={{ display: 'grid', gridTemplateColumns: '12px 1fr 1fr auto', gap: 12, alignItems: 'center', padding: '10px 0', borderBottom: '1px solid var(--bg-2)' }}>
              <div className="account-dot" style={{ background: a.color }}></div>
              <input className="input" style={{ height: 30 }} value={a.label} onChange={e => handleRename(a, e.target.value)} />
              <div style={{ fontSize: 12, color: 'var(--ink-2)', fontFamily: 'var(--font-mono)' }}>{a.email}</div>
              <button className="btn sm danger" onClick={() => handleRemove(a)}>Remove</button>
            </div>
          ))}
          {accounts.length < 10 && (
            <button className="btn" style={{ marginTop: 14 }} onClick={onAddAccount}>
              <Icon name="plus" size={12} /> Add account
            </button>
          )}
        </div>
      </div>

      <div className="settings-section">
        <h2>Behavior</h2>
        <div className="settings-body">
          <div className="form-row">
            <label className="form-label">Default AI mode</label>
            <div className="hstack">
              <button className={`btn ${localConfig.defaultMode === 'b' ? 'primary' : ''}`} onClick={() => persist({ defaultMode: 'b' })}>Mode B — Automatic</button>
              <button className={`btn ${localConfig.defaultMode === 'c' ? 'primary' : ''}`} onClick={() => persist({ defaultMode: 'c' })}>Mode C — On-demand</button>
            </div>
            <div className="form-help">Mode B ~$4–6/month. Mode C ~$0/month. Switch anytime from the top bar.</div>
          </div>
          <div className="form-row">
            <label className="form-label">Monthly budget cap (USD)</label>
            <input className="input mono" type="number" step="0.5" min="0" style={{ maxWidth: 160 }}
              value={localConfig.budgetCapMonthly}
              onChange={e => persist({ budgetCapMonthly: parseFloat(e.target.value) || 0 })} />
          </div>
        </div>
      </div>

      <div className="settings-section">
        <h2>Data</h2>
        <div className="settings-body">
          <div className="hstack" style={{ flexWrap: 'wrap' }}>
            <button className="btn" onClick={exportEvidence}><Icon name="download" size={12} /> Export EB-1A evidence (CSV)</button>
            <button className="btn danger" onClick={resetAll}>Reset everything</button>
          </div>
          <div className="form-help" style={{ marginTop: 10 }}>
            All data is stored in this browser's localStorage. Nothing is synced to a server. Tokens remain on this device only.
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const toast = useToast();
  const [config, setConfig] = useState(loadConfig());
  const [accounts, setAccounts] = useState(loadAccounts());
  const [page, setPage] = useState('inbox');
  const [selectedAccountId, setSelectedAccountId] = useState('all');
  const [selectedCategoryId, setSelectedCategoryId] = useState('all');
  const [selectedThreadId, setSelectedThreadId] = useState(null);
  const [emailsByAccount, setEmailsByAccount] = useState({});
  const [analyses, setAnalyses] = useState({});
  const [loading, setLoading] = useState({});
  const [syncingAll, setSyncingAll] = useState(false);
  const [analyzingThread, setAnalyzingThread] = useState(null);
  const [composerOpen, setComposerOpen] = useState(false);
  const [composerEmail, setComposerEmail] = useState(null);
  const [evidenceOpen, setEvidenceOpen] = useState(false);

  // hydrate analyses from storage
  useEffect(() => {
    const next = {};
    for (const k of storage.keys()) {
      if (k.startsWith('inboxos_analysis_')) {
        const a = storage.get(k);
        if (a) next[a.threadId] = a;
      }
    }
    setAnalyses(next);
  }, []);

  // flat list of emails across all accounts
  const allEmails = useMemo(() => {
    const list = [];
    for (const accId of Object.keys(emailsByAccount)) {
      list.push(...(emailsByAccount[accId] || []));
    }
    list.sort((a, b) => b.date - a.date);
    return list;
  }, [emailsByAccount]);

  // filtered email list
  const filteredEmails = useMemo(() => {
    let list = allEmails;
    if (selectedAccountId !== 'all') list = list.filter(e => e.receivingAccountId === selectedAccountId);
    if (selectedCategoryId !== 'all') list = list.filter(e => analyses[e.threadId]?.category === selectedCategoryId);
    return list;
  }, [allEmails, selectedAccountId, selectedCategoryId, analyses]);

  const selectedEmail = useMemo(
    () => allEmails.find(e => e.threadId === selectedThreadId) || null,
    [allEmails, selectedThreadId]
  );

  const emailCountByAccount = useMemo(() => {
    const out = {};
    for (const e of allEmails) out[e.receivingAccountId] = (out[e.receivingAccountId] || 0) + (e.isUnread ? 1 : 0);
    return out;
  }, [allEmails]);

  const emailCountByCategory = useMemo(() => {
    const out = {};
    for (const e of allEmails) {
      const cat = analyses[e.threadId]?.category;
      if (cat) out[cat] = (out[cat] || 0) + 1;
    }
    return out;
  }, [allEmails, analyses]);

  const monthlySpend = useMemo(() => {
    return summarizeUsage(usageFilter(loadUsageLog(), 'month')).cost;
  }, [analyses, composerOpen]); // recompute when things change

  const budgetHit = monthlySpend >= config.budgetCapMonthly;
  const budgetWarn = monthlySpend >= config.budgetCapMonthly * 0.8 && !budgetHit;

  // === Account ops ===
  async function handleAddAccount() {
    if (!config.googleClientId) { toast('Set Google Client ID in Settings first', 'error'); setPage('settings'); return; }
    if (accounts.length >= 10) { toast('10-account limit reached', 'warn'); return; }
    try {
      const result = await startOAuthFlow(config.googleClientId);
      if (accounts.find(a => a.email === result.email)) {
        toast(`${result.email} already connected`, 'warn');
        return;
      }
      const idx = accounts.length;
      const newAccount = {
        id: randomId(),
        label: DEFAULT_ACCOUNT_LABELS[idx] || `Account ${idx + 1}`,
        email: result.email,
        color: DEFAULT_ACCOUNT_COLORS[idx] || '#c8f57a',
        accessToken: result.accessToken,
        refreshToken: result.refreshToken,
        tokenExpiry: result.tokenExpiry,
        status: 'active',
        lastSynced: 0,
        gmailLabelIds: {},
        order: idx,
      };
      saveAccount(newAccount);
      setAccounts(a => [...a, newAccount]);
      toast(`Connected ${result.email}`, 'info');
      // fetch initial emails
      fetchAccountEmails(newAccount);
    } catch (e) {
      toast('OAuth failed: ' + e.message, 'error');
    }
  }

  async function fetchAccountEmails(account) {
    setLoading(l => ({ ...l, [account.id]: true }));
    try {
      const list = await listThreads(account, config.googleClientId, (acc) => {
        saveAccount(acc);
        setAccounts(a => a.map(x => x.id === acc.id ? acc : x));
      });
      const threadIds = (list.threads || []).map(t => t.id);
      const emails = [];
      for (const tid of threadIds.slice(0, 25)) {
        try {
          const thread = await getThread(account, config.googleClientId, () => {}, tid);
          const normalized = normalizeThread(thread, account);
          if (normalized) emails.push(normalized);
        } catch (e) { /* skip failed threads */ }
      }
      setEmailsByAccount(prev => ({ ...prev, [account.id]: emails }));
      const updated = { ...account, lastSynced: Date.now() };
      saveAccount(updated);
      setAccounts(a => a.map(x => x.id === account.id ? updated : x));
      // if mode B, auto-analyze
      if (config.currentMode === 'b' && config.anthropicApiKey && !budgetHit) {
        autoScanEmails(emails);
      }
    } catch (e) {
      toast(`${account.label}: ${e.message}`, 'error');
    } finally {
      setLoading(l => ({ ...l, [account.id]: false }));
    }
  }

  async function handleRefreshAll() {
    if (accounts.length === 0) { toast('No accounts connected', 'warn'); return; }
    setSyncingAll(true);
    for (const a of accounts) {
      if (a.status === 'active') await fetchAccountEmails(a);
    }
    setSyncingAll(false);
  }

  // === Analysis ===
  async function autoScanEmails(emails) {
    const toAnalyze = emails.filter(e => !analyses[e.threadId]).slice(0, 25);
    if (toAnalyze.length === 0) return;
    const batchSize = 5;
    for (let i = 0; i < toAnalyze.length; i += batchSize) {
      // recompute budget
      const spend = summarizeUsage(usageFilter(loadUsageLog(), 'month')).cost;
      if (spend >= config.budgetCapMonthly) {
        toast('Budget cap reached — Mode B paused', 'warn');
        return;
      }
      const batch = toAnalyze.slice(i, i + batchSize);
      await Promise.all(batch.map(e => runAnalysis(e, 'auto_scan')));
      if (i + batchSize < toAnalyze.length) await new Promise(r => setTimeout(r, 200));
    }
  }

  async function runAnalysis(email, callType = 'on_demand_analysis') {
    if (!config.anthropicApiKey) return;
    try {
      const result = await analyzeEmail(email, config);
      const record = {
        threadId: email.threadId,
        analyzedAt: Date.now(),
        category: result.category,
        summary: result.summary,
        suggestedAction: result.suggestedAction,
        priority: result.priority,
        eb1aSignal: result.eb1aSignal,
        inputTokens: result.inputTokens,
        outputTokens: result.outputTokens,
        cost: result.cost,
      };
      saveAnalysis(record);
      setAnalyses(a => ({ ...a, [email.threadId]: record }));
      appendUsage({
        timestamp: Date.now(),
        accountId: email.receivingAccountId,
        threadId: email.threadId,
        callType,
        inputTokens: result.inputTokens,
        outputTokens: result.outputTokens,
        cost: result.cost,
        mode: config.currentMode,
      });
    } catch (e) {
      toast('Analysis failed: ' + e.message, 'error');
    }
  }

  async function handleAnalyzeOne(email) {
    const spend = summarizeUsage(usageFilter(loadUsageLog(), 'month')).cost;
    if (spend >= config.budgetCapMonthly) {
      if (!confirm(`You've hit your $${config.budgetCapMonthly} cap. Continue anyway?`)) return;
    }
    setAnalyzingThread(email.threadId);
    await runAnalysis(email, 'on_demand_analysis');
    setAnalyzingThread(null);
  }

  // === Email actions ===
  async function handleReply(email) {
    setComposerEmail(email);
    setComposerOpen(true);
  }

  async function handleArchive(email) {
    const acc = accounts.find(a => a.id === email.receivingAccountId);
    if (!acc) return;
    try {
      await modifyThread(acc, config.googleClientId, () => {}, email.threadId, [], ['INBOX']);
      setEmailsByAccount(prev => ({
        ...prev,
        [acc.id]: (prev[acc.id] || []).filter(e => e.threadId !== email.threadId),
      }));
      if (selectedThreadId === email.threadId) setSelectedThreadId(null);
      toast('Archived', 'info');
    } catch (e) { toast('Archive failed: ' + e.message, 'error'); }
  }

  async function handleTrash(email) {
    const acc = accounts.find(a => a.id === email.receivingAccountId);
    if (!acc) return;
    try {
      await trashThread(acc, config.googleClientId, () => {}, email.threadId);
      setEmailsByAccount(prev => ({
        ...prev,
        [acc.id]: (prev[acc.id] || []).filter(e => e.threadId !== email.threadId),
      }));
      if (selectedThreadId === email.threadId) setSelectedThreadId(null);
      toast('Moved to trash', 'info');
    } catch (e) { toast('Trash failed: ' + e.message, 'error'); }
  }

  function handleSaveEvidence(email, analysis) {
    const record = {
      savedAt: Date.now(),
      threadId: email.threadId,
      subject: email.subject,
      sender: `${email.from.name} <${email.from.email}>`,
      criterion: analysis.eb1aSignal.criterion,
      explanation: analysis.eb1aSignal.explanation,
      accountId: email.receivingAccountId,
    };
    const list = loadEvidence();
    if (list.find(e => e.threadId === email.threadId)) {
      toast('Already in evidence register', 'warn');
      return;
    }
    list.push(record);
    saveEvidence(list);
    toast('Saved to evidence register', 'info');
  }

  // === Mode toggle ===
  function setMode(m) {
    const next = { ...config, currentMode: m };
    setConfig(next);
    saveConfig(next);
    toast(`Switched to Mode ${m.toUpperCase()}`, 'info');
    if (m === 'b' && !budgetHit) {
      // rescan unanalyzed
      autoScanEmails(allEmails);
    }
  }

  // onboarding
  if (!config.onboardingComplete) {
    return <Onboarding config={config} onComplete={(c) => { setConfig(c); }} />;
  }

  const mainLayoutClass = page === 'inbox' ? 'main' : 'main single';

  return (
    <>
      <div className="topbar">
        <div className="brand">
          <div className="brand-logo">I</div>
          <div className="brand-name">Inbox<em>OS</em></div>
        </div>
        <div className="top-nav">
          <button className={`top-nav-item ${page === 'inbox' ? 'active' : ''}`} onClick={() => setPage('inbox')}>
            <Icon name="inbox" size={12} /> &nbsp;Inbox
          </button>
          <button className={`top-nav-item ${page === 'usage' ? 'active' : ''}`} onClick={() => setPage('usage')}>
            <Icon name="activity" size={12} /> &nbsp;Usage
          </button>
          <button className={`top-nav-item ${page === 'settings' ? 'active' : ''}`} onClick={() => setPage('settings')}>
            <Icon name="settings" size={12} /> &nbsp;Settings
          </button>
        </div>
        <div className="top-spacer"></div>
        <div className="mode-toggle" title="AI mode">
          <button className={`mode-c ${config.currentMode === 'c' ? 'active' : ''}`} onClick={() => setMode('c')}>
            <span className="mode-dot"></span> Mode C · on-demand
          </button>
          <button className={`mode-b ${config.currentMode === 'b' ? 'active' : ''}`} onClick={() => setMode('b')}>
            <span className="mode-dot"></span> Mode B · auto
          </button>
        </div>
        {page === 'inbox' && (
          <button className="icon-btn" onClick={handleRefreshAll} disabled={syncingAll} title="Refresh all">
            {syncingAll ? <span className="spinner"></span> : <Icon name="refresh" size={13} />}
          </button>
        )}
      </div>

      {budgetWarn && (
        <div className="banner warn">
          <Icon name="alert" size={12} /> Approaching monthly cap — {Math.round(monthlySpend / config.budgetCapMonthly * 100)}% of ${config.budgetCapMonthly.toFixed(2)}
        </div>
      )}
      {budgetHit && (
        <div className="banner danger">
          <Icon name="alert" size={12} /> Monthly cap reached. Mode B is paused. On-demand analyses will confirm before proceeding.
        </div>
      )}

      {page === 'inbox' && (
        <div className={mainLayoutClass}>
          <aside className="sidebar">
            <div className="sidebar-scroll">
              <AccountsList
                accounts={accounts}
                selectedAccountId={selectedAccountId}
                setSelectedAccountId={setSelectedAccountId}
                onAddAccount={handleAddAccount}
                emailCountByAccount={emailCountByAccount}
              />
              <CategoryList
                categories={config.categories}
                selectedCategoryId={selectedCategoryId}
                setSelectedCategoryId={setSelectedCategoryId}
                emailCountByCategory={emailCountByCategory}
              />
              <EB1ARadar
                emails={allEmails}
                analyses={analyses}
                onOpenEvidence={() => setEvidenceOpen(true)}
                onSelectEmail={(e) => setSelectedThreadId(e.threadId)}
              />
            </div>
          </aside>

          <section className="list-panel">
            <div className="list-header">
              <div>
                <div className="list-title">
                  {selectedAccountId === 'all' ? 'All inboxes' : accounts.find(a => a.id === selectedAccountId)?.label || 'Inbox'}
                  <span className="list-title-meta"> · {filteredEmails.length}</span>
                </div>
              </div>
              <div className="list-actions">
                {accounts.length === 0 && (
                  <button className="btn primary sm" onClick={handleAddAccount}>
                    <Icon name="plus" size={12} /> Add account
                  </button>
                )}
              </div>
            </div>
            {accounts.length === 0 ? (
              <div className="empty">
                <div className="empty-icon">◈</div>
                <div className="empty-title">No accounts connected</div>
                <div className="empty-text">Connect your first Gmail account to start triaging. You can connect up to ten.</div>
                <button className="btn primary" style={{ marginTop: 14 }} onClick={handleAddAccount}>
                  <Icon name="plus" size={12} /> Connect Gmail
                </button>
              </div>
            ) : (
              <EmailList
                emails={filteredEmails}
                selectedThreadId={selectedThreadId}
                setSelectedThreadId={setSelectedThreadId}
                accounts={accounts}
                analyses={analyses}
                categories={config.categories}
              />
            )}
          </section>

          <aside className="detail-panel">
            <DetailPanel
              email={selectedEmail}
              accounts={accounts}
              analysis={selectedEmail ? analyses[selectedEmail.threadId] : null}
              config={config}
              onAnalyze={handleAnalyzeOne}
              analyzing={selectedEmail && analyzingThread === selectedEmail.threadId}
              onReply={handleReply}
              onArchive={handleArchive}
              onTrash={handleTrash}
              onLabelEb1aEvidence={handleSaveEvidence}
            />
          </aside>
        </div>
      )}

      {page === 'usage' && (
        <UsageDashboard config={config} setConfig={setConfig} accounts={accounts} />
      )}

      {page === 'settings' && (
        <SettingsPage config={config} setConfig={setConfig} accounts={accounts} setAccounts={setAccounts} onAddAccount={handleAddAccount} toast={toast} />
      )}

      {composerOpen && composerEmail && (
        <ReplyComposer
          email={composerEmail}
          accounts={accounts}
          config={config}
          onClose={() => { setComposerOpen(false); setComposerEmail(null); }}
          onSent={() => { setComposerOpen(false); setComposerEmail(null); }}
        />
      )}

      {evidenceOpen && <EvidenceModal onClose={() => setEvidenceOpen(false)} />}
    </>
  );
}

/* ============================================================
   BOOT
   ============================================================ */

if (handleOAuthRedirect()) {
  // page will close itself
} else {
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(
    <ToastProvider>
      <App />
    </ToastProvider>
  );
}
</script>
</body>
</html>
