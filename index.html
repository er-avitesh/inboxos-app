<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>InboxOS — Unified Gmail Command Center</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=Instrument+Serif:ital@0;1&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
  /* ---------- design tokens — pastel light ---------- */
  :root {
    --bg-0: #fbf7f2;        /* warm cream base */
    --bg-1: #ffffff;        /* panels */
    --bg-2: #f5efe8;        /* soft peach-cream */
    --bg-3: #ece5dc;        /* dusty cream */
    --bg-4: #dfd5c8;        /* taupe cream */
    --line: #e8dfd3;        /* soft line */
    --line-bright: #d4c7b4; /* emphasis line */
    --ink-0: #3a3340;       /* soft plum ink */
    --ink-1: #5a5166;       /* secondary ink */
    --ink-2: #8a8196;       /* muted ink */
    --ink-3: #b0a7bc;       /* tertiary */
    --ink-4: #d8d0e0;       /* faintest */
    --accent: #b8d4a8;       /* sage green */
    --accent-dim: #94b088;
    --accent-soft: rgba(184, 212, 168, 0.22);
    --warn: #e8b88c;         /* peach — for backgrounds/fills */
    --warn-ink: #b07a4a;     /* deep caramel — for readable text */
    --danger: #e89ca0;       /* dusty rose — for backgrounds/fills */
    --danger-ink: #b05a60;   /* deep rose — for readable text */
    --info: #a8c4dc;         /* powder blue */
    --success: #b0d4c0;      /* mint */

    /* category tokens — pastel */
    --cat-eb1a: #e89ca0;     /* dusty rose */
    --cat-career: #a8c4dc;   /* powder blue */
    --cat-finance: #e8c48c;  /* buttercream */
    --cat-college: #a4d4c0;  /* seafoam */
    --cat-business: #e8b890; /* apricot */
    --cat-news: #c8a8d4;     /* lavender */
    --cat-admin: #c4b8c8;    /* mauve gray */
    --cat-household: #e8b4d0; /* rose petal */
    --cat-weather: #e89ca0;  /* dusty rose */
    --cat-delete: #b8b0bc;   /* soft slate */

    --r-sm: 4px;
    --r-md: 6px;
    --r-lg: 10px;
    --r-xl: 14px;

    --font-display: 'Instrument Serif', serif;
    --font-sans: 'Geist', -apple-system, system-ui, sans-serif;
    --font-mono: 'IBM Plex Mono', ui-monospace, monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: var(--font-sans);
    background: var(--bg-0);
    color: var(--ink-0);
    font-size: 13px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
    overflow: hidden;
  }

  /* ambient background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(1200px 600px at 10% -10%, rgba(184, 212, 168, 0.15), transparent 50%),
      radial-gradient(800px 400px at 90% 110%, rgba(168, 196, 220, 0.12), transparent 50%),
      radial-gradient(600px 500px at 50% 50%, rgba(232, 180, 208, 0.06), transparent 60%);
    pointer-events: none;
    z-index: 0;
  }

  #root { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }

  /* ---------- typography ---------- */
  .display { font-family: var(--font-display); font-weight: 400; letter-spacing: -0.01em; }
  .mono { font-family: var(--font-mono); font-variant-numeric: tabular-nums; }
  .num { font-variant-numeric: tabular-nums; font-feature-settings: 'tnum'; }

  /* ---------- top bar ---------- */
  .topbar {
    display: flex;
    align-items: center;
    height: 44px;
    padding: 0 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-1);
    gap: 14px;
    flex-shrink: 0;
  }
  .brand {
    display: flex;
    align-items: center;
    gap: 8px;
    padding-right: 14px;
    border-right: 1px solid var(--line);
    height: 100%;
  }
  .brand-logo {
    width: 22px; height: 22px;
    background: var(--accent);
    border-radius: 5px;
    display: grid; place-items: center;
    color: #3a3340;
    font-family: var(--font-mono);
    font-weight: 600;
    font-size: 12px;
  }
  .brand-name {
    font-family: var(--font-display);
    font-size: 18px;
    font-style: italic;
    letter-spacing: -0.02em;
  }
  .brand-name em { font-style: normal; color: var(--accent); font-family: var(--font-mono); font-size: 13px; font-weight: 500; letter-spacing: 0; }

  .top-nav { display: flex; gap: 2px; align-items: center; height: 100%; }
  .top-nav-item {
    padding: 0 12px;
    height: 26px;
    display: flex;
    align-items: center;
    color: var(--ink-2);
    font-size: 12.5px;
    border-radius: var(--r-md);
    cursor: pointer;
    transition: all 0.12s ease;
    border: none;
    background: transparent;
    font-family: inherit;
  }
  .top-nav-item:hover { color: var(--ink-0); background: var(--bg-3); }
  .top-nav-item.active { color: var(--ink-0); background: var(--bg-3); }

  .top-spacer { flex: 1; }

  /* mode toggle */
  .mode-toggle {
    display: flex;
    align-items: center;
    gap: 0;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    padding: 2px;
    height: 28px;
  }
  .mode-toggle button {
    border: none;
    background: transparent;
    color: var(--ink-2);
    font-family: var(--font-mono);
    font-size: 11px;
    padding: 0 10px;
    height: 100%;
    cursor: pointer;
    border-radius: 4px;
    display: flex;
    align-items: center;
    gap: 6px;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    transition: all 0.12s ease;
  }
  .mode-toggle button.active {
    background: var(--bg-1);
    color: var(--ink-0);
    box-shadow: 0 1px 0 rgba(90, 81, 102, 0.04);
  }
  .mode-toggle button.active.mode-b { color: #6a8858; }
  .mode-toggle button.active.mode-c { color: #5a8099; }
  .mode-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }

  .icon-btn {
    width: 28px; height: 28px;
    display: grid; place-items: center;
    background: transparent;
    border: 1px solid transparent;
    border-radius: var(--r-md);
    color: var(--ink-2);
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .icon-btn:hover { background: var(--bg-3); color: var(--ink-0); border-color: var(--line); }

  /* ---------- main layout ---------- */
  .main {
    flex: 1;
    display: grid;
    grid-template-columns: 240px 1fr 340px;
    min-height: 0;
    overflow: hidden;
  }
  .main.single { grid-template-columns: 1fr; }

  /* ---------- sidebar ---------- */
  .sidebar {
    border-right: 1px solid var(--line);
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .sidebar-scroll { overflow-y: auto; flex: 1; padding: 14px 0; }
  .side-section { padding: 0 14px; margin-bottom: 18px; }
  .side-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .side-label .count { color: var(--ink-2); }

  /* accounts list */
  .account-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 6px 8px;
    border-radius: var(--r-md);
    cursor: pointer;
    color: var(--ink-1);
    font-size: 12.5px;
    margin: 0 -8px;
    transition: background 0.12s ease;
  }
  .account-item:hover { background: var(--bg-3); }
  .account-item.active { background: var(--bg-3); color: var(--ink-0); }
  .account-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    flex-shrink: 0;
    box-shadow: 0 0 0 2px rgba(255,255,255,0.04);
  }
  .account-item.warning { color: var(--warn-ink); }
  .account-item .count-badge {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 10px;
    color: var(--ink-2);
    background: var(--bg-3);
    padding: 1px 6px;
    border-radius: 9px;
    min-width: 18px;
    text-align: center;
  }
  .account-item.active .count-badge { background: var(--bg-4); color: var(--ink-0); }

  .side-btn {
    width: 100%;
    padding: 7px 10px;
    background: transparent;
    border: 1px dashed var(--line-bright);
    border-radius: var(--r-md);
    color: var(--ink-2);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.15s ease;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    margin-top: 8px;
  }
  .side-btn:hover { border-color: var(--accent-dim); color: #6a8858; background: var(--accent-soft); }

  /* categories */
  .cat-item {
    display: flex;
    align-items: center;
    gap: 9px;
    padding: 5px 8px;
    border-radius: var(--r-md);
    cursor: pointer;
    color: var(--ink-1);
    font-size: 12.5px;
    margin: 0 -8px;
    transition: background 0.12s ease;
  }
  .cat-item:hover { background: var(--bg-3); }
  .cat-item.active { background: var(--bg-3); color: var(--ink-0); }
  .cat-swatch { width: 3px; height: 14px; border-radius: 1px; flex-shrink: 0; }
  .cat-label { flex: 1; }
  .cat-count { font-family: var(--font-mono); font-size: 10.5px; color: var(--ink-3); }

  /* eb1a radar */
  .radar-item {
    padding: 8px 10px;
    border-radius: var(--r-md);
    background: var(--bg-2);
    border: 1px solid var(--line);
    margin-bottom: 6px;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .radar-item:hover { border-color: var(--cat-eb1a); }
  .radar-criterion {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--cat-eb1a);
    margin-bottom: 3px;
  }
  .radar-subject {
    font-size: 11.5px;
    color: var(--ink-0);
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .radar-sender { font-size: 10.5px; color: var(--ink-2); margin-top: 3px; }

  /* ---------- email list ---------- */
  .list-panel {
    background: var(--bg-0);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    min-width: 0;
  }
  .list-header {
    padding: 10px 18px 10px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    flex-shrink: 0;
  }
  .list-title {
    font-family: var(--font-display);
    font-size: 26px;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .list-title-meta {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-2);
    margin-left: 4px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .list-actions { margin-left: auto; display: flex; gap: 6px; align-items: center; }

  .filter-bar {
    padding: 8px 18px;
    border-bottom: 1px solid var(--line);
    display: flex;
    gap: 6px;
    align-items: center;
    background: var(--bg-1);
    flex-shrink: 0;
    overflow-x: auto;
  }
  .chip {
    height: 24px;
    padding: 0 10px;
    border-radius: 12px;
    border: 1px solid var(--line);
    background: var(--bg-2);
    color: var(--ink-1);
    font-size: 11.5px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
    transition: all 0.12s ease;
    font-family: inherit;
  }
  .chip:hover { border-color: var(--line-bright); }
  .chip.active { background: var(--ink-0); color: var(--bg-0); border-color: var(--ink-0); }
  .chip-dot { width: 6px; height: 6px; border-radius: 50%; }

  .email-list { flex: 1; overflow-y: auto; }
  .email-row {
    padding: 12px 18px;
    border-bottom: 1px solid var(--line);
    cursor: pointer;
    display: grid;
    grid-template-columns: 4px 20px 1fr auto;
    gap: 10px;
    align-items: start;
    transition: background 0.1s ease;
    position: relative;
  }
  .email-row:hover { background: var(--bg-1); }
  .email-row.selected { background: var(--bg-2); }
  .email-row.unread .email-subject { font-weight: 600; color: var(--ink-0); }
  .email-row.unread::before {
    content: '';
    position: absolute;
    left: 0; top: 50%;
    transform: translateY(-50%);
    width: 2px; height: 60%;
    background: var(--accent-dim);
    border-radius: 2px;
  }

  .email-account-bar { width: 2px; border-radius: 2px; align-self: stretch; }
  .email-priority { width: 4px; height: 4px; border-radius: 50%; margin-top: 8px; background: var(--ink-3); }
  .email-priority.high { background: var(--danger); }
  .email-priority.medium { background: var(--warn); }

  .email-content { min-width: 0; }
  .email-meta-line {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 3px;
  }
  .email-sender {
    font-size: 12.5px;
    color: var(--ink-1);
    font-weight: 500;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 220px;
  }
  .email-account-pill {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 1px 6px;
    border-radius: 3px;
    background: var(--bg-3);
    color: var(--ink-2);
    flex-shrink: 0;
  }
  .email-subject {
    font-size: 13px;
    color: var(--ink-1);
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .email-snippet {
    font-size: 12px;
    color: var(--ink-2);
    line-height: 1.4;
    margin-top: 2px;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 1;
    -webkit-box-orient: vertical;
  }
  .email-ai-tag {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-family: var(--font-mono);
    font-size: 9.5px;
    color: var(--ink-2);
    margin-top: 6px;
    padding: 2px 6px;
    background: var(--bg-2);
    border-radius: 3px;
    border: 1px solid var(--line);
  }
  .email-ai-tag.eb1a { color: var(--cat-eb1a); border-color: rgba(232, 156, 160, 0.45); background: rgba(232, 156, 160, 0.12); }
  .email-cat-dot { width: 5px; height: 5px; border-radius: 50%; display: inline-block; }

  .email-time {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    white-space: nowrap;
    padding-top: 2px;
  }

  /* empty states */
  .empty {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
    text-align: center;
    color: var(--ink-3);
  }
  .empty-icon {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 52px;
    color: var(--ink-4);
    margin-bottom: 8px;
    line-height: 1;
  }
  .empty-title {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 20px;
    color: var(--ink-1);
    margin-bottom: 6px;
  }
  .empty-text { font-size: 12.5px; color: var(--ink-2); max-width: 360px; line-height: 1.55; }

  /* ---------- detail panel ---------- */
  .detail-panel {
    border-left: 1px solid var(--line);
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .detail-scroll { flex: 1; overflow-y: auto; }
  .detail-header {
    padding: 14px;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  .detail-subject {
    font-family: var(--font-display);
    font-size: 19px;
    line-height: 1.25;
    color: var(--ink-0);
    margin-bottom: 8px;
    letter-spacing: -0.01em;
  }
  .detail-meta-row {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 11.5px;
    color: var(--ink-2);
    margin-bottom: 4px;
    flex-wrap: wrap;
  }
  .detail-from { color: var(--ink-1); font-weight: 500; }
  .detail-routing {
    margin-top: 8px;
    padding: 8px 10px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    font-size: 11.5px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .routing-label {
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
  }

  /* ai panel */
  .ai-panel {
    margin: 14px;
    padding: 12px;
    background: linear-gradient(180deg, rgba(184, 212, 168, 0.18), rgba(184, 212, 168, 0.04));
    border: 1px solid rgba(184, 212, 168, 0.4);
    border-radius: var(--r-lg);
    box-shadow: 0 1px 0 rgba(148, 176, 136, 0.1);
  }
  .ai-panel.placeholder {
    background: var(--bg-2);
    border: 1px dashed var(--line-bright);
    box-shadow: none;
  }
  .ai-header {
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: #6a8858;
    margin-bottom: 10px;
  }
  .ai-placeholder .ai-header { color: var(--ink-3); }
  .ai-summary { font-size: 12.5px; color: var(--ink-0); line-height: 1.5; margin-bottom: 10px; }
  .ai-stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 8px; }
  .ai-stat {
    padding: 8px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
  }
  .ai-stat-label {
    font-family: var(--font-mono);
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-3);
    margin-bottom: 3px;
  }
  .ai-stat-value { font-size: 12px; color: var(--ink-0); font-weight: 500; }
  .eb1a-callout {
    margin-top: 10px;
    padding: 10px;
    background: rgba(232, 156, 160, 0.14);
    border: 1px solid rgba(232, 156, 160, 0.35);
    border-radius: var(--r-md);
  }
  .eb1a-title {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--cat-eb1a);
    margin-bottom: 6px;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .eb1a-explanation { font-size: 12px; color: var(--ink-1); line-height: 1.5; margin-bottom: 8px; }

  /* detail body */
  .detail-body {
    padding: 14px;
    font-size: 13px;
    color: var(--ink-1);
    line-height: 1.6;
    white-space: pre-wrap;
    word-break: break-word;
  }

  /* detail actions */
  .detail-actions {
    padding: 10px 14px;
    border-top: 1px solid var(--line);
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    background: var(--bg-1);
    flex-shrink: 0;
  }

  /* ---------- buttons ---------- */
  .btn {
    height: 30px;
    padding: 0 12px;
    border-radius: var(--r-md);
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-0);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all 0.14s ease;
    white-space: nowrap;
    box-shadow: 0 1px 0 rgba(90, 81, 102, 0.03);
  }
  .btn:hover { background: var(--bg-2); border-color: var(--line-bright); color: var(--ink-0); box-shadow: 0 2px 6px rgba(90, 81, 102, 0.08); }
  .btn.primary { background: var(--accent); color: #3a3340; border-color: var(--accent-dim); font-weight: 500; box-shadow: 0 1px 0 rgba(148, 176, 136, 0.25); }
  .btn.primary:hover { background: #a4c898; border-color: #8aa880; color: #3a3340; box-shadow: 0 3px 10px rgba(148, 176, 136, 0.3); }
  .btn.danger { color: #b05a60; }
  .btn.danger:hover { background: rgba(232, 156, 160, 0.15); border-color: var(--danger); }
  .btn.sm { height: 26px; padding: 0 9px; font-size: 11.5px; }
  .btn.lg { height: 38px; padding: 0 18px; font-size: 13px; }
  .btn:disabled { opacity: 0.5; cursor: not-allowed; }

  /* ---------- reply composer ---------- */
  .composer-overlay {
    position: fixed;
    inset: 0;
    background: rgba(90, 81, 102, 0.28);
    backdrop-filter: blur(6px);
    z-index: 50;
    display: flex;
    align-items: flex-end;
    justify-content: flex-end;
    padding: 0;
  }
  .composer {
    width: min(720px, 100%);
    height: min(86vh, 720px);
    background: var(--bg-1);
    border: 1px solid var(--line-bright);
    border-radius: var(--r-xl) var(--r-xl) 0 0;
    margin-right: 20px;
    display: flex;
    flex-direction: column;
    box-shadow: 0 -20px 60px rgba(90, 81, 102, 0.18);
    overflow: hidden;
  }
  .composer-head {
    padding: 12px 16px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-2);
    flex-shrink: 0;
  }
  .composer-head h3 { font-family: var(--font-display); font-size: 18px; font-style: italic; letter-spacing: -0.01em; font-weight: 400; }
  .composer-fields { padding: 10px 16px; border-bottom: 1px solid var(--line); flex-shrink: 0; }
  .composer-field {
    display: grid;
    grid-template-columns: 60px 1fr;
    gap: 10px;
    padding: 6px 0;
    border-bottom: 1px solid var(--bg-2);
    align-items: center;
  }
  .composer-field:last-child { border-bottom: none; }
  .composer-field label {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .composer-field input, .composer-field .field-static {
    background: transparent;
    border: none;
    color: var(--ink-0);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    padding: 2px 0;
    width: 100%;
  }
  .field-static { color: var(--ink-1); }
  .field-locked {
    display: inline-flex;
    align-items: center;
    gap: 6px;
  }
  .lock-pill {
    font-family: var(--font-mono);
    font-size: 9px;
    color: #b07a4a;
    background: rgba(232, 184, 140, 0.2);
    border: 1px solid rgba(232, 184, 140, 0.4);
    padding: 1px 6px;
    border-radius: 3px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .composer-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    min-height: 0;
  }
  .composer-textarea {
    flex: 1;
    padding: 14px 16px;
    background: transparent;
    border: none;
    color: var(--ink-0);
    font-family: inherit;
    font-size: 13px;
    line-height: 1.6;
    outline: none;
    resize: none;
  }
  .composer-quote {
    padding: 12px 16px;
    background: var(--bg-0);
    border-top: 1px solid var(--line);
    font-size: 11.5px;
    color: var(--ink-2);
    max-height: 180px;
    overflow-y: auto;
    white-space: pre-wrap;
    flex-shrink: 0;
  }
  .composer-foot {
    padding: 12px 16px;
    border-top: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 8px;
    background: var(--bg-2);
    flex-shrink: 0;
  }

  /* ---------- usage dashboard ---------- */
  .page {
    flex: 1;
    overflow-y: auto;
    padding: 24px 32px 60px;
    max-width: 100%;
  }
  .page-header {
    margin-bottom: 28px;
    display: flex;
    align-items: flex-end;
    gap: 16px;
    flex-wrap: wrap;
  }
  .page-title {
    font-family: var(--font-display);
    font-size: 48px;
    font-style: italic;
    letter-spacing: -0.02em;
    line-height: 1;
  }
  .page-subtitle { color: var(--ink-2); font-size: 13px; max-width: 520px; }

  .tab-row {
    display: flex;
    gap: 2px;
    border-bottom: 1px solid var(--line);
    margin-bottom: 24px;
  }
  .tab {
    padding: 10px 18px;
    background: transparent;
    border: none;
    color: var(--ink-2);
    font-family: var(--font-mono);
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    cursor: pointer;
    position: relative;
    transition: color 0.12s ease;
  }
  .tab:hover { color: var(--ink-0); }
  .tab.active { color: var(--ink-0); }
  .tab.active::after {
    content: '';
    position: absolute;
    bottom: -1px; left: 0; right: 0;
    height: 2px;
    background: var(--accent-dim);
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(6, 1fr);
    gap: 1px;
    background: var(--line);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    overflow: hidden;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-1);
    padding: 16px;
  }
  .stat-label {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    margin-bottom: 8px;
  }
  .stat-value {
    font-family: var(--font-display);
    font-size: 30px;
    font-style: italic;
    letter-spacing: -0.01em;
    color: var(--ink-0);
    line-height: 1;
  }
  .stat-sub {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-2);
    margin-top: 6px;
  }
  .stat-value.positive { color: var(--accent-dim); }
  .stat-value.warn { color: var(--warn-ink); }
  .stat-value.danger { color: var(--danger-ink); }

  .chart-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 20px;
    margin-bottom: 16px;
  }
  .chart-card h3 {
    font-family: var(--font-display);
    font-size: 20px;
    font-style: italic;
    letter-spacing: -0.01em;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .chart-container { height: 240px; position: relative; }

  .budget-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 16px;
  }
  .budget-card {
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    padding: 20px;
  }
  .budget-bar {
    height: 10px;
    background: var(--bg-3);
    border-radius: 5px;
    overflow: hidden;
    margin: 12px 0;
    position: relative;
  }
  .budget-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent-dim), var(--accent));
    transition: width 0.4s ease;
  }
  .budget-fill.warn { background: linear-gradient(90deg, #d4a168, var(--warn)); }
  .budget-fill.danger { background: linear-gradient(90deg, #c47880, var(--danger)); }
  .budget-amounts {
    display: flex;
    justify-content: space-between;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--ink-2);
  }

  /* ---------- saved indicator ---------- */
  .saved-indicator {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 12px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: 20px;
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-2);
    transition: all 0.25s ease;
  }
  .saved-indicator.flash {
    background: var(--accent-soft);
    border-color: var(--accent-dim);
    color: #6a8858;
  }
  .saved-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--ink-3);
    transition: all 0.25s ease;
  }
  .saved-indicator.flash .saved-dot {
    background: var(--accent-dim);
    box-shadow: 0 0 0 3px rgba(184, 212, 168, 0.3);
    animation: pulse-saved 0.6s ease;
  }
  @keyframes pulse-saved {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }

  /* ---------- settings ---------- */
  .settings-section {
    margin-bottom: 32px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-lg);
    overflow: hidden;
  }
  .settings-section h2 {
    font-family: var(--font-display);
    font-size: 22px;
    font-style: italic;
    letter-spacing: -0.01em;
    font-weight: 400;
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-2);
  }
  .settings-body { padding: 20px; }
  .form-row { margin-bottom: 16px; }
  .form-row:last-child { margin-bottom: 0; }
  .form-label {
    display: block;
    font-family: var(--font-mono);
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--ink-2);
    margin-bottom: 6px;
  }
  .form-help { font-size: 11.5px; color: var(--ink-3); margin-top: 6px; line-height: 1.5; }
  .input {
    width: 100%;
    height: 36px;
    padding: 0 12px;
    background: var(--bg-2);
    border: 1px solid var(--line);
    border-radius: var(--r-md);
    color: var(--ink-0);
    font-family: inherit;
    font-size: 13px;
    outline: none;
    transition: border-color 0.15s ease;
  }
  .input:focus { border-color: var(--accent); }
  .input.mono { font-family: var(--font-mono); }

  /* ---------- onboarding ---------- */
  .onboard {
    position: fixed;
    inset: 0;
    display: grid;
    place-items: center;
    background: var(--bg-0);
    z-index: 100;
    overflow-y: auto;
  }
  .onboard-card {
    width: min(620px, calc(100% - 40px));
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--r-xl);
    padding: 36px 40px;
    margin: 40px 0;
    position: relative;
  }
  .onboard-step {
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    color: var(--ink-3);
    margin-bottom: 16px;
  }
  .onboard h1 {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 44px;
    letter-spacing: -0.02em;
    line-height: 1.05;
    margin-bottom: 16px;
    font-weight: 400;
  }
  .onboard p { color: var(--ink-1); font-size: 14px; line-height: 1.65; margin-bottom: 14px; }
  .onboard .muted { color: var(--ink-2); font-size: 12.5px; }
  .onboard ol, .onboard ul { margin: 14px 0 20px 20px; color: var(--ink-1); font-size: 13px; }
  .onboard li { margin-bottom: 6px; line-height: 1.55; }
  .onboard code {
    font-family: var(--font-mono);
    font-size: 11.5px;
    background: var(--bg-3);
    padding: 2px 6px;
    border-radius: 3px;
    color: #6a8858;
  }
  .onboard-footer { display: flex; gap: 8px; margin-top: 24px; align-items: center; }
  .onboard-progress {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }
  .onboard-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--ink-4);
  }
  .onboard-dot.active { background: var(--accent-dim); }
  .onboard-dot.done { background: var(--accent); }

  /* ---------- toast ---------- */
  .toast-stack {
    position: fixed;
    bottom: 20px;
    right: 20px;
    z-index: 200;
    display: flex;
    flex-direction: column;
    gap: 8px;
    max-width: 380px;
  }
  .toast {
    padding: 12px 14px;
    background: var(--bg-1);
    border: 1px solid var(--line-bright);
    border-left: 3px solid var(--accent);
    border-radius: var(--r-md);
    font-size: 12.5px;
    color: var(--ink-0);
    box-shadow: 0 10px 30px rgba(90, 81, 102, 0.15);
    animation: slide-in 0.2s ease;
  }
  .toast.error { border-left-color: var(--danger); }
  .toast.warn { border-left-color: var(--warn); }
  @keyframes slide-in {
    from { transform: translateX(20px); opacity: 0; }
    to { transform: translateX(0); opacity: 1; }
  }

  /* ---------- banner ---------- */
  .banner {
    padding: 10px 18px;
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 12.5px;
    border-bottom: 1px solid var(--line);
  }
  .banner.warn { background: rgba(232, 184, 140, 0.22); color: #b07a4a; border-bottom-color: rgba(232, 184, 140, 0.4); }
  .banner.danger { background: rgba(232, 156, 160, 0.22); color: #b05a60; border-bottom-color: rgba(232, 156, 160, 0.4); }

  /* ---------- evidence modal ---------- */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(90, 81, 102, 0.32);
    backdrop-filter: blur(6px);
    z-index: 60;
    display: grid;
    place-items: center;
    padding: 20px;
  }
  .modal {
    width: min(840px, 100%);
    max-height: 80vh;
    background: var(--bg-1);
    border: 1px solid var(--line-bright);
    border-radius: var(--r-xl);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .modal-head {
    padding: 16px 20px;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--bg-2);
  }
  .modal-body { flex: 1; overflow-y: auto; padding: 20px; }

  .evidence-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .evidence-table th {
    text-align: left;
    padding: 8px 10px;
    font-family: var(--font-mono);
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--ink-3);
    border-bottom: 1px solid var(--line);
    font-weight: 500;
  }
  .evidence-table td {
    padding: 10px;
    border-bottom: 1px solid var(--line);
    color: var(--ink-1);
    vertical-align: top;
  }
  .crit-pill {
    display: inline-block;
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    padding: 2px 6px;
    background: rgba(232, 156, 160, 0.18);
    color: #b05a60;
    border-radius: 3px;
    border: 1px solid rgba(232, 156, 160, 0.4);
  }

  /* ---------- multi-select ---------- */
  .email-select {
    width: 14px;
    height: 14px;
    border: 1.5px solid var(--line-bright);
    border-radius: 3px;
    background: var(--bg-1);
    display: grid;
    place-items: center;
    cursor: pointer;
    transition: all 0.12s ease;
    flex-shrink: 0;
  }
  .email-select:hover { border-color: var(--accent-dim); }
  .email-select.checked { background: var(--accent); border-color: var(--accent-dim); }
  .email-select.checked::after {
    content: '';
    width: 7px; height: 7px;
    background: var(--bg-1);
    border-radius: 1.5px;
    transform: scale(0.8);
  }
  .multiselect-bar {
    padding: 8px 18px;
    background: var(--accent-soft);
    border-bottom: 1px solid var(--accent-dim);
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 12.5px;
    color: #6a8858;
    flex-shrink: 0;
  }
  .multiselect-bar strong { color: var(--ink-0); }

  /* ---------- resize handle ---------- */
  .resize-handle {
    width: 5px;
    background: transparent;
    cursor: col-resize;
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s ease;
  }
  .resize-handle::before {
    content: '';
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 2px; height: 32px;
    background: var(--line-bright);
    border-radius: 1px;
    opacity: 0;
    transition: opacity 0.15s ease;
  }
  .resize-handle:hover::before, .resize-handle.dragging::before { opacity: 1; background: var(--accent-dim); }
  .resize-handle.dragging { background: var(--accent-soft); }

  /* ---------- expanded reader ---------- */
  .reader-overlay {
    position: fixed;
    inset: 0;
    background: rgba(90, 81, 102, 0.35);
    backdrop-filter: blur(8px);
    z-index: 55;
    display: grid;
    place-items: center;
    padding: 32px;
    animation: fade-in 0.18s ease;
  }
  @keyframes fade-in { from { opacity: 0; } to { opacity: 1; } }
  .reader-modal {
    width: min(880px, 100%);
    height: min(88vh, 900px);
    background: var(--bg-1);
    border: 1px solid var(--line-bright);
    border-radius: var(--r-xl);
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 24px 60px rgba(90, 81, 102, 0.25);
    position: relative;
  }
  .reader-head {
    padding: 18px 24px 14px;
    border-bottom: 1px solid var(--line);
    background: var(--bg-2);
    flex-shrink: 0;
  }
  .reader-subject {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 26px;
    line-height: 1.25;
    color: var(--ink-0);
    letter-spacing: -0.01em;
    margin-bottom: 10px;
    padding-right: 40px;
  }
  .reader-meta {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    font-size: 12px;
    color: var(--ink-2);
  }
  .reader-body {
    flex: 1;
    overflow-y: auto;
    padding: 22px 28px;
    font-size: 14px;
    line-height: 1.7;
    color: var(--ink-0);
    white-space: pre-wrap;
    word-break: break-word;
  }
  .reader-close {
    position: absolute;
    top: 14px;
    right: 14px;
    z-index: 2;
  }
  .reader-actions {
    padding: 12px 20px;
    border-top: 1px solid var(--line);
    background: var(--bg-2);
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }

  /* ---------- loading overlay ---------- */
  .loading-overlay {
    position: absolute;
    inset: 0;
    background: rgba(251, 247, 242, 0.88);
    backdrop-filter: blur(2px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 14px;
    z-index: 10;
    animation: fade-in 0.2s ease;
  }
  .loading-ring {
    width: 32px; height: 32px;
    border: 2.5px solid var(--bg-3);
    border-top-color: var(--accent-dim);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }
  .loading-label {
    font-family: var(--font-display);
    font-style: italic;
    font-size: 18px;
    color: var(--ink-1);
    letter-spacing: -0.01em;
  }
  .loading-sub {
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-3);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }

  /* ---------- last sync ---------- */
  .sync-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 0 10px;
    height: 26px;
    border-radius: 13px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    font-family: var(--font-mono);
    font-size: 10.5px;
    color: var(--ink-2);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }
  .sync-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--accent-dim);
  }

  /* ---------- radar item delete ---------- */
  .radar-item { position: relative; }
  .radar-delete {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 18px; height: 18px;
    border-radius: 3px;
    border: none;
    background: transparent;
    color: var(--ink-3);
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    transition: all 0.12s ease;
  }
  .radar-item:hover .radar-delete { display: flex; }
  .radar-delete:hover { background: rgba(232, 156, 160, 0.18); color: var(--danger-ink); }

  /* ---------- info chip button ---------- */
  .info-chip {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 3px 8px;
    border-radius: 10px;
    border: 1px solid var(--line);
    background: var(--bg-1);
    color: var(--ink-2);
    font-family: var(--font-mono);
    font-size: 9.5px;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    cursor: pointer;
    transition: all 0.12s ease;
  }
  .info-chip:hover { border-color: var(--accent-dim); color: #6a8858; background: var(--accent-soft); }

  /* ---------- scanning indicator ---------- */
  .scan-indicator {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    background: var(--accent-soft);
    border: 1px solid var(--accent-dim);
    border-radius: var(--r-md);
    font-size: 11.5px;
    color: #6a8858;
    margin: 0 14px 10px;
  }

  /* ---------- scrollbars ---------- */
  ::-webkit-scrollbar { width: 8px; height: 8px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--bg-3); border-radius: 4px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--bg-4); }

  /* ---------- spinner ---------- */
  .spinner {
    width: 12px; height: 12px;
    border: 1.5px solid var(--ink-4);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.6s linear infinite;

/* ============================================================
   STORAGE LAYER — IndexedDB with localStorage-compatible API
   ============================================================
   Why IndexedDB: localStorage in some browsers gets wiped on close
   (privacy settings, incognito), has ~5-10MB quota, and sync-only.
   IndexedDB: ~50MB+ quota, survives better, async. We keep the same
   sync-looking API by using a synchronous in-memory cache that's
   hydrated from IDB on boot, with async writes.
   ============================================================ */

const IDB_NAME = 'inboxos_db';
const IDB_STORE = 'kv';
const IDB_VERSION = 1;
let _idb = null;
let _idbReady = null;

function openIDB() {
  if (_idbReady) return _idbReady;
  _idbReady = new Promise((resolve, reject) => {
    const req = indexedDB.open(IDB_NAME, IDB_VERSION);
    req.onupgradeneeded = (e) => {
      const db = e.target.result;
      if (!db.objectStoreNames.contains(IDB_STORE)) {
        db.createObjectStore(IDB_STORE);
      }
    };
    req.onsuccess = () => { _idb = req.result; resolve(_idb); };
    req.onerror = () => reject(req.error);
  });
  return _idbReady;
}

async function idbGetAll() {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const store = tx.objectStore(IDB_STORE);
    const result = {};
    const req = store.openCursor();
    req.onsuccess = (e) => {
      const cursor = e.target.result;
      if (cursor) {
        result[cursor.key] = cursor.value;
        cursor.continue();
      } else {
        resolve(result);
      }
    };
    req.onerror = () => reject(req.error);
  });
}

async function idbSet(key, value) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

async function idbDelete(key) {
  const db = await openIDB();
  return new Promise((resolve, reject) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).delete(key);
    tx.oncomplete = () => resolve();
    tx.onerror = () => reject(tx.error);
  });
}

// In-memory cache — mirrors IDB for synchronous access
const _cache = {};
let _cacheHydrated = false;

// Migrate localStorage → IDB once, then use IDB
async function hydrateStorage() {
  try {
    // Load from IDB
    const all = await idbGetAll();
    for (const [k, v] of Object.entries(all)) _cache[k] = v;

    // One-time migration from localStorage if any inboxos_* keys exist there
    // and aren't already in IDB
    let migrated = 0;
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('inboxos_')) continue;
      if (_cache[key] !== undefined) continue; // already in IDB
      try {
        const raw = localStorage.getItem(key);
        const value = raw ? JSON.parse(raw) : null;
        if (value !== null) {
          _cache[key] = value;
          await idbSet(key, value);
          migrated++;
        }
      } catch (e) { /* skip malformed */ }
    }
    _cacheHydrated = true;
    if (migrated > 0) console.log(`[InboxOS] Migrated ${migrated} keys from localStorage to IndexedDB`);
    return migrated;
  } catch (e) {
    console.error('[InboxOS] IDB hydrate failed, falling back to localStorage:', e);
    // Fallback: hydrate cache from localStorage
    for (let i = 0; i < localStorage.length; i++) {
      const key = localStorage.key(i);
      if (!key || !key.startsWith('inboxos_')) continue;
      try {
        const raw = localStorage.getItem(key);
        _cache[key] = raw ? JSON.parse(raw) : null;
      } catch {}
    }
    _cacheHydrated = true;
    return -1;
  }
}

// Storage API — same shape as before, now backed by IDB + sync cache
const storage = {
  get(key, fallback = null) {
    if (_cache[key] === undefined) return fallback;
    return _cache[key];
  },
  set(key, value) {
    _cache[key] = value;
    // Fire-and-forget async write — if IDB fails, fall back to localStorage
    idbSet(key, value).catch(e => {
      console.warn('[InboxOS] IDB write failed, using localStorage:', e);
      try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
    });
    // Also mirror to localStorage for cross-tool compat (small overhead, big safety)
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  },
  remove(key) {
    delete _cache[key];
    idbDelete(key).catch(() => {});
    try { localStorage.removeItem(key); } catch {}
  },
  keys() {
    return Object.keys(_cache);
  },
  // Diagnostic
  async info() {
    const ls = [];
    for (let i = 0; i < localStorage.length; i++) {
      const k = localStorage.key(i);
      if (k && k.startsWith('inboxos_')) ls.push(k);
    }
    const idb = Object.keys(_cache);
    let idbQuota = null;
    try {
      if (navigator.storage?.estimate) {
        const est = await navigator.storage.estimate();
        idbQuota = { used: est.usage, quota: est.quota };
      }
    } catch {}
    return { localStorageKeys: ls.length, idbKeys: idb.length, cacheKeys: idb.length, idbQuota, hydrated: _cacheHydrated };
  },
};

/* ============================================================
   PKCE HELPERS
   ============================================================ */

function base64UrlEncode(bytes) {
  const str = btoa(String.fromCharCode(...new Uint8Array(bytes)));
  return str.replace(/\+/g, '-').replace(/\//g, '_').replace(/=+$/, '');
}

async function generatePKCE() {
  const bytes = new Uint8Array(64);
  crypto.getRandomValues(bytes);
  const verifier = base64UrlEncode(bytes).slice(0, 86);
  const hash = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier));
  const challenge = base64UrlEncode(hash);
  return { verifier, challenge };
}

function randomId() {
  const bytes = new Uint8Array(8);
  crypto.getRandomValues(bytes);
  return Array.from(bytes).map(b => b.toString(16).padStart(2, '0')).join('');
}

/* ============================================================
   OAUTH FLOW — Google Identity Services (token flow)
   ============================================================ */

// Wait for GIS to be ready
function waitForGIS() {
  return new Promise((resolve, reject) => {
    if (window.google?.accounts?.oauth2) return resolve();
    let waited = 0;
    const interval = setInterval(() => {
      if (window.google?.accounts?.oauth2) {
        clearInterval(interval);
        resolve();
      } else if (waited > 5000) {
        clearInterval(interval);
        reject(new Error('Google Identity Services did not load. Check your internet connection.'));
      }
      waited += 100;
    }, 100);
  });
}

async function startOAuthFlow(clientId) {
  if (!clientId) throw new Error('Google OAuth Client ID not set. Configure it in Settings.');
  await waitForGIS();

  return new Promise((resolve, reject) => {
    try {
      const tokenClient = window.google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: OAUTH_SCOPES,
        prompt: 'consent',
        callback: async (response) => {
          if (response.error) {
            reject(new Error('OAuth error: ' + (response.error_description || response.error)));
            return;
          }
          try {
            // Fetch the profile to get the email address
            const profileRes = await fetch(`${GMAIL_API_BASE}/profile`, {
              headers: { Authorization: 'Bearer ' + response.access_token },
            });
            if (!profileRes.ok) throw new Error('Failed to fetch Gmail profile');
            const profile = await profileRes.json();

            resolve({
              email: profile.emailAddress,
              accessToken: response.access_token,
              refreshToken: '', // GIS token flow does not provide refresh tokens
              tokenExpiry: Date.now() + ((response.expires_in || 3600) * 1000),
            });
          } catch (e) {
            reject(e);
          }
        },
        error_callback: (err) => {
          reject(new Error('OAuth flow failed: ' + (err.message || err.type || 'unknown error')));
        },
      });
      tokenClient.requestAccessToken();
    } catch (e) {
      reject(e);
    }
  });
}

// GIS token flow doesn't give refresh tokens — re-auth is via silent token request or full re-auth
async function refreshAccessToken(account, clientId) {
  await waitForGIS();

  return new Promise((resolve, reject) => {
    try {
      const tokenClient = window.google.accounts.oauth2.initTokenClient({
        client_id: clientId,
        scope: OAUTH_SCOPES,
        hint: account.email,  // helps Google know which account to reuse
        prompt: '',           // silent refresh — no popup if session is still valid
        callback: (response) => {
          if (response.error) {
            // silent refresh failed — user needs to re-auth
            reject(new Error('needs_reauth'));
            return;
          }
          resolve({
            ...account,
            accessToken: response.access_token,
            tokenExpiry: Date.now() + ((response.expires_in || 3600) * 1000),
            status: 'active',
          });
        },
        error_callback: () => {
          reject(new Error('needs_reauth'));
        },
      });
      tokenClient.requestAccessToken();
    } catch (e) {
      reject(e);
    }
  });
}

/* ============================================================
   GMAIL API
   ============================================================ */

async function withToken(account, clientId, setAccount) {
  if (!account || account.status === 'needs_reconnect') throw new Error('Account needs reconnect');
  if (Date.now() > account.tokenExpiry - 5 * 60 * 1000) {
    try {
      const refreshed = await refreshAccessToken(account, clientId);
      saveAccount(refreshed);
      setAccount && setAccount(refreshed);
      return refreshed.accessToken;
    } catch (e) {
      const bad = { ...account, status: 'needs_reconnect' };
      saveAccount(bad);
      setAccount && setAccount(bad);
      throw e;
    }
  }
  return account.accessToken;
}

async function gmailFetch(path, options, token) {
  const res = await fetch(`${GMAIL_API_BASE}${path}`, {
    ...options,
    headers: { ...(options?.headers || {}), Authorization: 'Bearer ' + token },
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Gmail API ${res.status}: ${txt}`);
  }
  return res.json();
}

async function listThreads(account, clientId, setAccount, query = 'in:inbox', maxResults = 25) {

  return gmailFetch(`/threads?${q}`, { method: 'GET' }, token);
}

async function getThread(account, clientId, setAccount, threadId) {

async function sendReply(account, clientId, setAccount, { to, subject, body, threadId, inReplyTo, references }) {
  const token = await withToken(account, clientId, setAccount);
  const headers = [
    `From: ${account.email}`,
    `To: ${to}`,
    `Subject: ${subject}`,
    `In-Reply-To: ${inReplyTo}`,
    `References: ${references || inReplyTo}`,
    'Content-Type: text/plain; charset=UTF-8',
    'MIME-Version: 1.0',
  ].join('\r\n');
  const raw = headers + '\r\n\r\n' + body;
  const encoded = base64UrlEncode(new TextEncoder().encode(raw));
  return gmailFetch('/messages/send', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ raw: encoded, threadId }),
  }, token);
}

/* ============================================================
   EMAIL PARSING
   ============================================================ */

function decodeBase64Url(str) {
  try {
    const padded = str.replace(/-/g, '+').replace(/_/g, '/') + '=='.slice(0, (4 - str.length % 4) % 4);
    const binary = atob(padded);
    const bytes = new Uint8Array(binary.length);
    for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
    return new TextDecoder('utf-8').decode(bytes);
  } catch { return ''; }
}

function extractBody(payload) {
  if (!payload) return '';
  if (payload.body && payload.body.data && (payload.mimeType === 'text/plain' || payload.mimeType === 'text/html')) {
    const raw = decodeBase64Url(payload.body.data);
    if (payload.mimeType === 'text/html') {
      const tmp = document.createElement('div');
      tmp.innerHTML = raw;
      return (tmp.textContent || tmp.innerText || '').trim();
    }
    return raw;
  }
  if (payload.parts) {
    // prefer text/plain
    const plain = payload.parts.find(p => p.mimeType === 'text/plain');
    if (plain) return extractBody(plain);
    for (const p of payload.parts) {
      const b = extractBody(p);
      if (b) return b;
    }
  }
  return '';
}

function parseHeaderValue(headers, name) {
  const h = headers?.find(x => x.name.toLowerCase() === name.toLowerCase());
  return h?.value || '';
}

function parseFromHeader(from) {
  const m = from.match(/^\s*"?([^"<]*?)"?\s*<([^>]+)>\s*$/);
  if (m) return { name: m[1].trim() || m[2], email: m[2].trim() };
  return { name: from.trim(), email: from.trim() };
}

function parseUnsubscribe(headers) {
  // RFC 2369 List-Unsubscribe: e.g. <mailto:u@ex.com>, <https://ex.com/unsub?id=123>
  // RFC 8058 List-Unsubscribe-Post: "List-Unsubscribe=One-Click" (indicates one-click POST support)
  const lu = parseHeaderValue(headers, 'List-Unsubscribe');
  const lup = parseHeaderValue(headers, 'List-Unsubscribe-Post');
  if (!lu) return null;
  const urls = [];
  const mailtos = [];
  // Match <...> groups
  const matches = lu.match(/<([^>]+)>/g) || [];
  for (const m of matches) {
    const v = m.slice(1, -1).trim();
    if (v.startsWith('mailto:')) mailtos.push(v.slice(7));
    else if (v.startsWith('http')) urls.push(v);
  }
  return {
    urls,
    mailtos,
    oneClick: /One-Click/i.test(lup), // RFC 8058 — can POST silently
  };
}

function normalizeThread(thread, account) {
  const messages = thread.messages || [];
  const last = messages[messages.length - 1];
  if (!last) return null;
  const headers = last.payload?.headers || [];
  const from = parseFromHeader(parseHeaderValue(headers, 'From'));
  const subject = parseHeaderValue(headers, 'Subject') || '(no subject)';
  const date = parseHeaderValue(headers, 'Date');
  const messageIdHeader = parseHeaderValue(headers, 'Message-ID') || parseHeaderValue(headers, 'Message-Id');
  const references = parseHeaderValue(headers, 'References');
  const body = extractBody(last.payload);
  const snippet = thread.snippet || last.snippet || '';
  const labels = last.labelIds || [];
  const isUnread = labels.includes('UNREAD');
  const unsubscribe = parseUnsubscribe(headers);
  return {
    threadId: thread.id,
    messageId: last.id,
    messageIdHeader,
    references,
    subject,
    from,
    date: date ? new Date(date).getTime() : Date.now(),
    body: body.slice(0, 8000),
    snippet,
    labels,
    isUnread,
    unsubscribe,
    receivingAccountId: account.id,
    receivingAccountEmail: account.email,
  };
}

function formatTime(timestamp) {
  const d = new Date(timestamp);
  const now = new Date();
  const diffMs = now - d;
  const diffDays = Math.floor(diffMs / (1000 * 60 * 60 * 24));
  if (diffDays === 0) return d.toLocaleTimeString([], { hour: 'numeric', minute: '2-digit' });
  if (diffDays === 1) return 'Yesterday';
  if (diffDays < 7) return d.toLocaleDateString([], { weekday: 'short' });
  return d.toLocaleDateString([], { month: 'short', day: 'numeric' });
}

function formatRelative(timestamp) {
  if (!timestamp) return 'never';
  const diffMs = Date.now() - timestamp;
  const mins = Math.floor(diffMs / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return `${mins}m ago`;
  const hours = Math.floor(mins / 60);
  if (hours < 24) return `${hours}h ago`;
  const days = Math.floor(hours / 24);
  return `${days}d ago`;
}

/* ============================================================
   CLAUDE API
   ============================================================ */

async function callClaude({ apiKey, model, systemPrompt, userPrompt, maxTokens = 400 }) {
  if (!apiKey) throw new Error('Anthropic API key not set');
  const res = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'x-api-key': apiKey,
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true',
    },
    body: JSON.stringify({
      model: model || DEFAULT_MODEL,
      max_tokens: maxTokens,
      system: systemPrompt,
      messages: [{ role: 'user', content: userPrompt }],
    }),
  });
  if (!res.ok) {
    const txt = await res.text();
    throw new Error(`Anthropic API ${res.status}: ${txt}`);
  }
  const data = await res.json();
  const text = data.content.map(b => b.type === 'text' ? b.text : '').join('');
  return {
    text,
    inputTokens: data.usage?.input_tokens || 0,
    outputTokens: data.usage?.output_tokens || 0,
  };
}

function buildTriageSystemPrompt(categories) {
  const catList = categories.map(c => c.id).join('|');
  return `You are a Gmail triage assistant for Avitesh Kesharwani (researcher/engineer in Concord NC, pursuing EB-1A visa, part-time student, owns laundry business).

Output JSON only, no preamble, no fences. Schema:
{"category":"<${catList}>","summary":"<1 sentence>","suggestedAction":"<reply|archive|save|unsubscribe|review>","priority":"<high|medium|low>","eb1aSignal":{"detected":<bool>,"criterion":"<judging|publications|critical_role|media|high_salary|awards|memberships|contributions|null>","explanation":"<1 sentence or null>"}}

EB-1A signals: judging (review papers/competitions), publications (citations, accepts), critical_role (leadership recognition), media (press/podcast), high_salary (exceptional offers), awards, memberships (distinguished orgs), contributions (work cited/built on).`;
}

async function analyzeEmail(email, config) {
  const model = config.anthropicModel || DEFAULT_MODEL;
  const modelInfo = ANTHROPIC_MODELS[model] || ANTHROPIC_MODELS[DEFAULT_MODEL];
  const systemPrompt = buildTriageSystemPrompt(config.categories);
  // Leaner prompt - no redundant labels, shorter body slice, snippet only if body is empty
  const bodyText = (email.body || email.snippet || '').slice(0, 300);
  const userPrompt = `From: ${email.from.name}\nSubject: ${email.subject}\nBody: ${bodyText}`;

  const { text, inputTokens, outputTokens } = await callClaude({
    apiKey: config.anthropicApiKey,
    model,
    systemPrompt,
    userPrompt,
    maxTokens: 250,
  });

  let parsed;
  try {
    const clean = text.replace(/```json|```/g, '').trim();
    parsed = JSON.parse(clean);
  } catch {
    parsed = {
      category: 'admin',
      summary: 'Could not parse AI response',
      suggestedAction: 'review',
      priority: 'low',
      eb1aSignal: { detected: false, criterion: null, explanation: null },
    };
  }

  const cost = inputTokens * modelInfo.inputPerToken + outputTokens * modelInfo.outputPerToken;
  return { ...parsed, inputTokens, outputTokens, cost, model };
}

async function draftReply(email, instruction, config) {
  const model = config.anthropicModel || DEFAULT_MODEL;
  const modelInfo = ANTHROPIC_MODELS[model] || ANTHROPIC_MODELS[DEFAULT_MODEL];
  const systemPrompt = `Draft a professional email reply for Avitesh Kesharwani. Write only the reply body — no subject, no preamble. Match the tone of the original. Sign off as "Avitesh".`;
  const userPrompt = `Reply to this email.\nFrom: ${email.from.name} <${email.from.email}>\nSubject: ${email.subject}\nBody: ${email.body.slice(0, 1500)}${instruction ? `\n\nUser instruction: ${instruction}` : ''}`;

  const { text, inputTokens, outputTokens } = await callClaude({
    apiKey: config.anthropicApiKey,
    model,
    systemPrompt,
    userPrompt,
    maxTokens: 500,
  });
  const cost = inputTokens * modelInfo.inputPerToken + outputTokens * modelInfo.outputPerToken;
  return { text: text.trim(), inputTokens, outputTokens, cost, model };
}

/* ============================================================
   RULE-BASED PRE-CLASSIFIER — free triage for obvious emails
   ============================================================ */

// Returns an analysis-shaped object for emails we can classify without AI,
// or null if AI is needed. This saves ~30-50% of API calls on typical inboxes.
function preClassify(email) {
  const from = (email.from.email || '').toLowerCase();
  const fromName = (email.from.name || '').toLowerCase();
  const subject = (email.subject || '').toLowerCase();
  const snippet = (email.snippet || '').toLowerCase();
  const all = `${from} ${fromName} ${subject} ${snippet}`;

  // Obvious promo/marketing patterns
  const promoSenders = [
    'dollarshaveclub', 'lowes.com', 'whirlpool', 'nerdwallet', 'target.com',
    'groupon', 'bestbuy', 'homedepot', 'macys', 'kohls', 'wayfair',
    'email.', 'marketing.', 'promo.', 'deals.', 'news.', 'updates.',
    'offers.', 'go.', 'mail.', 'e.', 'em.', 'notifications@',
  ];
  const promoKeywords = ['% off', 'unsubscribe', 'limited time', 'deal', 'sale ends', 'free shipping'];
  const promoHit = promoSenders.some(p => from.includes(p)) || promoKeywords.filter(k => all.includes(k)).length >= 2;

  if (promoHit && !subject.includes('receipt') && !subject.includes('order')) {
    return makeAnalysis('delete', 'Promotional email / marketing', 'unsubscribe', 'low');
  }

  // Weather & emergency alerts
  if (from.includes('weather.gov') || from.includes('noaa') || fromName.includes('weather') || subject.includes('weather alert')) {
    return makeAnalysis('weather_alerts', 'Weather or emergency alert', 'review', 'medium');
  }

  // LinkedIn job alerts
  if (from.includes('linkedin.com') && (subject.includes('job') || subject.includes('hiring') || subject.includes('opportunity'))) {
    return makeAnalysis('career', 'LinkedIn job alert', 'review', 'low');
  }

  // Gmail's own notifications / security
  if (from.includes('no-reply@accounts.google.com') || from.includes('googlemail.com')) {
    return makeAnalysis('admin', 'Google account notification', 'review', 'low');
  }

  // Known newsletter patterns
  const newsletterSenders = ['substack.com', 'mailchi.mp', 'campaign-archive', 'beehiiv.com', 'buttondown.email'];
  if (newsletterSenders.some(n => from.includes(n))) {
    return makeAnalysis('news', 'Newsletter / digest', 'review', 'low');
  }

  // Receipts and transactional
  if (/receipt|invoice|payment|order #|confirmation/.test(subject) && !promoHit) {
    return makeAnalysis('finance', 'Receipt / transaction confirmation', 'archive', 'low');
  }

  // Can't confidently classify — let AI handle it
  return null;
}

function makeAnalysis(category, summary, action, priority) {
  return {
    category,
    summary,
    suggestedAction: action,
    priority,
    eb1aSignal: { detected: false, criterion: null, explanation: null },
    inputTokens: 0,
    outputTokens: 0,
    cost: 0,
    preClassified: true,
  };
}

const ToastContext = React.createContext(null);
function useToast() { return React.useContext(ToastContext); }

function ToastProvider({ children }) {
  const [toasts, setToasts] = useState([]);
  const push = useCallback((msg, type = 'info', ms = 3500) => {
    const id = randomId();
    setToasts(t => [...t, { id, msg, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), ms);
  }, []);
  return (
    <ToastContext.Provider value={push}>
      {children}
      <div className="toast-stack">
        {toasts.map(t => <div key={t.id} className={`toast ${t.type}`}>{t.msg}</div>)}
      </div>
    </ToastContext.Provider>
  );
}

function EB1ARadar({ emails, analyses, onOpenEvidence, onSelectEmail, onDismissSignal, onOpenInfo }) {
  const signals = useMemo(() => {
    const out = [];
    const dismissed = storage.get('inboxos_dismissed_signals', []);
    const dismissedSet = new Set(dismissed);
    for (const email of emails) {
      const a = analyses[email.threadId];
      if (a?.eb1aSignal?.detected && !dismissedSet.has(email.threadId)) {
        out.push({ email, analysis: a });
      }
    }
    out.sort((a, b) => (CRITERION_RANK[a.analysis.eb1aSignal.criterion] || 99) - (CRITERION_RANK[b.analysis.eb1aSignal.criterion] || 99));
    return out;
  }, [emails, analyses]);

  return (
    <div className="side-section">
      <div className="side-label">
        <span style={{ color: 'var(--cat-eb1a)' }}>EB-1A Radar</span>
        <span className="count">{signals.length}</span>
      </div>
      {signals.slice(0, 5).map(s => (
        <div key={s.email.threadId} className="radar-item" onClick={() => onSelectEmail(s.email)}>
          <button
            className="radar-delete"
            title="Dismiss signal"
            onClick={(ev) => { ev.stopPropagation(); onDismissSignal(s.email.threadId); }}
          >
            <Icon name="x" size={11} />
          </button>
          <div className="radar-criterion">{CRITERION_LABELS[s.analysis.eb1aSignal.criterion] || s.analysis.eb1aSignal.criterion}</div>
          <div className="radar-subject">{s.email.subject}</div>
          <div className="radar-sender">{s.email.from.name}</div>
        </div>
      ))}
      {signals.length === 0 && (
        <div style={{ padding: '8px 10px', fontSize: 11.5, color: 'var(--ink-3)', lineHeight: 1.5, fontStyle: 'italic' }}>
          No signals detected yet. Analyze emails to populate.
        </div>
      )}
      <div style={{ display: 'flex', gap: 6, marginTop: 10, flexWrap: 'wrap' }}>
        <button className="side-btn" style={{ marginTop: 0, flex: 1 }} onClick={onOpenEvidence}>
